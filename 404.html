<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – PackArcade</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #0a0c0f;
            color: #fff;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background: rgba(10, 12, 15, 0.7);
            backdrop-filter: blur(5px);
            padding: 20px;
        }
        h1 {
            font-size: 8rem;
            margin: 0;
            text-shadow: 0 0 20px #ff00c1, 0 0 40px #00ffea;
            animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; }
            95% { transform: skew(5deg, -2deg); opacity: 0.8; }
            96% { transform: skew(-5deg, 2deg); opacity: 0.9; }
            97% { transform: skew(3deg, -1deg); }
        }
        p {
            font-size: 1.5rem;
            max-width: 600px;
            margin: 20px 0;
            color: #a8d8ff;
        }
        a {
            display: inline-block;
            padding: 12px 30px;
            border: 2px solid #a8d8ff;
            color: #a8d8ff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: 0.3s;
        }
        a:hover {
            background: #a8d8ff;
            color: #0a0c0f;
            box-shadow: 0 0 20px #a8d8ff;
        }
    </style>
</head>
<body>
    <canvas id="glitchCanvas"></canvas>
    <div class="content">
        <h1>404</h1>
        <p>You've wandered into a forgotten level. This page does not exist in this dimension.</p>
        <a href="/">↳ Return to the Arcade</a>
    </div>
    <script>
        const canvas = document.getElementById('glitchCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                size: Math.random() * 2 + 1,
                color: `hsl(${Math.random() * 360}, 100%, 70%)`
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 12, 15, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();

                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });

            // occasional glitch lines
            if (Math.random() < 0.05) {
                ctx.fillStyle = 'rgba(255, 0, 255, 0.3)';
                ctx.fillRect(0, Math.random() * canvas.height, canvas.width, Math.random() * 20);
            }

            requestAnimationFrame(draw);
        }
        draw();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
