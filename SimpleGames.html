<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleGames · advanced studio</title>
    <!-- Ace editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/ace.js"></script>
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a2a1f;
            height: 100vh;
            overflow: hidden;
            color: #ddd;
        }
        /* video background */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
            filter: brightness(0.3) blur(3px);
        }
        /* overlay to ensure readability */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 20, 10, 0.6);
            z-index: -1;
        }
        #studio {
            display: flex;
            height: 100vh;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }
        .toolbar {
            background: rgba(22, 37, 22, 0.9);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            border-bottom: 1px solid #2d442d;
        }
        .toolbar img.logo {
            height: 36px;
            margin-right: 0.5rem;
        }
        .toolbar button {
            background: #2d442d;
            border: none;
            color: #ccc;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #405c40;
            transition: 0.1s;
        }
        .toolbar button:hover {
            background: #3d603d;
            color: white;
        }
        .toolbar .spacer {
            flex: 1;
        }
        .toolbar .validate-btn {
            background: #4d4a2d;
            border-color: #8b8b2e;
            color: #ffffb0;
        }
        .toolbar .push-btn {
            background: #2d4a3b;
            border-color: #2e8b57;
            color: #b0ffd0;
        }
        .toolbar .home-btn {
            background: #3d3d5a;
            border-color: #6a6a8a;
        }
        .toolbar .sound-toggle {
            background: transparent;
            border: none;
            color: #b0dab0;
            font-size: 1.2rem;
            padding: 0.3rem 0.6rem;
        }
        .main-panel {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: rgba(26, 42, 26, 0.7);
            backdrop-filter: blur(4px);
        }
        .file-tree {
            width: 320px;
            background: rgba(28, 46, 28, 0.8);
            backdrop-filter: blur(2px);
            border-right: 2px solid #2a422a;
            padding: 1rem 0.5rem 1rem 1rem;
            overflow-y: auto;
            user-select: none;
            font-size: 0.95rem;
        }
        .tree-root {
            list-style: none;
            padding-left: 0.5rem;
        }
        .tree-node {
            list-style: none;
            margin: 2px 0;
            white-space: nowrap;
        }
        .tree-node .item-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px 4px 4px;
            border-radius: 8px;
            cursor: default;
            background: #253825;
            margin: 2px 0;
            border: 1px solid transparent;
            transition: background 0.1s;
            position: relative;
        }
        .tree-node .item-row:hover {
            background: #2f4a2f;
            border-color: #4f7a4f;
        }
        .tree-node .item-row.selected {
            background: #3e643e;
            border-left: 4px solid #8cba8c;
        }
        .item-row.dragover {
            background: #4a7a4a !important;
            border: 1px dashed #a9ffa9;
        }
        .item-row i {
            width: 20px;
            color: #b0dab0;
        }
        .item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .folder-children {
            list-style: none;
            padding-left: 24px;
            margin-left: 8px;
            border-left: 1px dotted #3a5a3a;
        }
        .empty-folder {
            color: #6a8a6a;
            font-style: italic;
            padding-left: 28px;
            font-size: 0.85rem;
        }
        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(26, 42, 26, 0.5);
        }
        #editor {
            width: 100%;
            height: 100%;
            font-size: 14px;
        }
        .status-bar {
            background: rgba(22, 37, 22, 0.9);
            padding: 0.4rem 1.2rem;
            font-size: 0.85rem;
            color: #8aaa8a;
            border-top: 1px solid #2d442d;
            display: flex;
            justify-content: space-between;
        }
        .dragging-ghost {
            background: #4c8c4c;
            padding: 6px 16px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 8px 16px black;
        }
        i.fa-folder { color: #7ae07a; }
        i.fa-file { color: #b0d0b0; }
        .validation-result {
            color: #ffd966;
        }
    </style>
</head>
<body>

<!-- Video Background -->
<video id="bgVideo" autoplay loop muted playsinline>
    <source src="bg.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- Audio for background music (hidden, controlled via JS) -->
<audio id="bgMusic" loop>
    <source src="bg.mp3" type="audio/mpeg">
</audio>

<!-- Main studio -->
<div id="studio">
    <div class="toolbar">
        <img src="logo.jpg" alt="SimpleGames" class="logo">
        <button id="newFileBtn"><i class="fas fa-file"></i> new file</button>
        <button id="newFolderBtn"><i class="fas fa-folder-plus"></i> new folder</button>
        <button id="deleteBtn"><i class="fas fa-trash-alt"></i> delete</button>
        <span class="spacer"></span>
        <button id="validateBtn" class="validate-btn"><i class="fas fa-check-circle"></i> validate</button>
        <button id="saveBtn"><i class="fas fa-save"></i> save</button>
        <button id="pushBtn" class="push-btn"><i class="fab fa-github"></i> push</button>
        <button id="homeBtn" class="home-btn" onclick="window.location.href='/'"><i class="fas fa-home"></i> home</button>
        <button id="musicToggle" class="sound-toggle"><i class="fas fa-music"></i></button>
        <button id="videoToggle" class="sound-toggle"><i class="fas fa-video"></i></button>
    </div>
    <div class="main-panel">
        <div class="file-tree" id="fileTreeContainer">
            <!-- dynamic tree injected -->
        </div>
        <div class="editor-pane">
            <div id="editor"></div>
            <div class="status-bar">
                <span id="status">📄 ready</span>
                <span id="validationMsg" class="validation-result"></span>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- VIRTUAL FILESYSTEM (advanced demo) ----------
        let items = [
            { id: 'root', name: 'simple-games', type: 'folder', parent: null, content: null },
            { id: 'f1', name: 'shooter.simple', type: 'file', parent: 'root', 
              content: `// Spaceship Shooter Advanced
Var:
  @max_score=100@
  @lives=3@
  @player_speed=5@
  @enemy_speed=2@

Player: @pos=(100,300)@ $speed=player_speed $fireRate=0.5 $invincible=false
Enemy: @pos=(700,200)@ $speed=enemy_speed $move=sin $health=2

Level_1:
  @width=20@ @height=12@
  tiles:
    11111111111111111111
    10000000000000000001
    100P0000000000000001
    100000000000E0000001
    11111111111111111111
  properties:
    @background=stars@
    @music=intense.ogg@

Physics:
  gravity = @0@
  friction = @0.05@
  max_speed = @8@
  collisions = @pixel_perfect@

OnCollision: @Player,Bullet,Enemy@ $score+=10 $playSound=explode.wav $spawn=Explosion
OnCollision: @Player,Enemy@ $lives-=1 $resetPos $if(lives<=0) $gameOver

Sprites:
  player = "ship.png"
  enemy = "enemy.png"
  bullet = "laser.png"
  explosion = "explode.png"

Anim_Explosion:
  frames: @1,2,3,4,5@ $fps=24 $loop=false

ParticleSystem ExplosionParticles:
  @count=20@ @lifetime=1.5@ $spread=360 $speed=50 $color=orange

Behavior Patrol:
  states:
    idle: @duration=2@ then=move
    move: @target=random@ $speed=1.5
  on_see_player: chase

Camera:
  @follow=player@ $shake_on_hit=true $bounds=(0,0,2000,2000)

If Debug_ENAbLE -True:
  $showHitboxes
  $logCollisions
  $overlay_info

WinCondition: @score>=max_score@
LoseCondition: @lives==0@` },
            { id: 'f2', name: 'readme.txt', type: 'file', parent: 'root',
              content: 'Use .simple files. Syntax: @...@, $..., sections, and cheat codes.' }
        ];

        // helper functions (unchanged)
        function genId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 9); }
        function getChildren(parentId) {
            return items.filter(it => it.parent === parentId).sort((a,b) => a.name.localeCompare(b.name));
        }
        function getItem(id) { return items.find(it => it.id === id); }
        function isDescendant(descendantId, ancestorId) {
            if (descendantId === ancestorId) return true;
            let item = getItem(descendantId);
            while (item && item.parent) {
                if (item.parent === ancestorId) return true;
                item = getItem(item.parent);
            }
            return false;
        }

        let selectedFileId = null;
        let aceEditor = null;

        // Render tree (same as before)
        function renderTree() {
            const container = document.getElementById('fileTreeContainer');
            container.innerHTML = ''; 
            const rootFolder = getItem('root');
            if (!rootFolder) return;
            const rootUl = document.createElement('ul');
            rootUl.className = 'tree-root';
            renderNode('root', rootUl, 0);
            container.appendChild(rootUl);
            attachDragDropListeners();
        }

        function renderNode(parentId, parentUl, depth) {
            const children = getChildren(parentId);
            if (children.length === 0) return;
            for (let child of children) {
                const li = document.createElement('li');
                li.className = 'tree-node';
                li.dataset.id = child.id;
                li.dataset.type = child.type;
                li.setAttribute('draggable', child.type === 'file' || child.type === 'folder');
                
                const row = document.createElement('div');
                row.className = `item-row ${selectedFileId === child.id ? 'selected' : ''}`;
                row.dataset.id = child.id;
                
                const icon = document.createElement('i');
                icon.className = child.type === 'folder' ? 'fas fa-folder' : 'fas fa-file-code';
                row.appendChild(icon);
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'item-name';
                nameSpan.textContent = child.name;
                row.appendChild(nameSpan);
                
                li.appendChild(row);
                
                if (child.type === 'folder') {
                    const childContainer = document.createElement('ul');
                    childContainer.className = 'folder-children';
                    renderNode(child.id, childContainer, depth+1);
                    if (getChildren(child.id).length === 0) {
                        const emptyLi = document.createElement('li');
                        emptyLi.className = 'empty-folder';
                        emptyLi.textContent = '⌀ empty';
                        childContainer.appendChild(emptyLi);
                    }
                    li.appendChild(childContainer);
                }
                
                parentUl.appendChild(li);
            }
        }

        // Drag and drop (unchanged)
        let draggedId = null;
        let currentDragoverFolderRow = null;

        function findFolderNode(element) {
            let current = element.closest('.tree-node');
            while (current) {
                if (current.dataset.type === 'folder') {
                    return current;
                }
                current = current.parentElement?.closest('.tree-node');
            }
            return null;
        }

        function attachDragDropListeners() {
            const treeContainer = document.getElementById('fileTreeContainer');
            treeContainer.ondragover = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                const folderNode = findFolderNode(e.target);
                if (!folderNode) {
                    if (currentDragoverFolderRow) {
                        currentDragoverFolderRow.classList.remove('dragover');
                        currentDragoverFolderRow = null;
                    }
                    return;
                }
                const folderRow = folderNode.querySelector('.item-row');
                if (folderRow && folderRow !== currentDragoverFolderRow) {
                    if (currentDragoverFolderRow) {
                        currentDragoverFolderRow.classList.remove('dragover');
                    }
                    folderRow.classList.add('dragover');
                    currentDragoverFolderRow = folderRow;
                }
            };
            treeContainer.ondragleave = (e) => {
                if (currentDragoverFolderRow) {
                    currentDragoverFolderRow.classList.remove('dragover');
                    currentDragoverFolderRow = null;
                }
            };
            treeContainer.ondrop = (e) => {
                e.preventDefault();
                if (currentDragoverFolderRow) {
                    currentDragoverFolderRow.classList.remove('dragover');
                    currentDragoverFolderRow = null;
                }
                const folderNode = findFolderNode(e.target);
                if (!folderNode) {
                    const dragged = draggedId || e.dataTransfer.getData('text/plain');
                    if (!dragged) return;
                    const draggedItem = getItem(dragged);
                    if (!draggedItem || draggedItem.id === 'root') return;
                    draggedItem.parent = 'root';
                    renderTree();
                    return;
                }
                const targetId = folderNode.dataset.id;
                const targetItem = getItem(targetId);
                if (!targetItem || targetItem.type !== 'folder') return;
                const dragged = draggedId || e.dataTransfer.getData('text/plain');
                if (!dragged) return;
                if (dragged === targetId || isDescendant(targetId, dragged)) {
                    alert('Cannot move a folder into itself or its subfolder.');
                    return;
                }
                const draggedItem = getItem(dragged);
                if (!draggedItem) return;
                draggedItem.parent = targetId;
                renderTree();
            };
            const allRows = document.querySelectorAll('.item-row');
            allRows.forEach(row => {
                const li = row.closest('.tree-node');
                if (!li) return;
                const id = li.dataset.id;
                const type = li.dataset.type;
                row.setAttribute('draggable', type === 'file' || type === 'folder');
                row.ondragstart = (e) => {
                    if (type !== 'file' && type !== 'folder') {
                        e.preventDefault();
                        return;
                    }
                    draggedId = id;
                    e.dataTransfer.setData('text/plain', id);
                    e.dataTransfer.effectAllowed = 'move';
                    const ghost = document.createElement('span');
                    ghost.className = 'dragging-ghost';
                    ghost.textContent = getItem(id)?.name || 'item';
                    document.body.appendChild(ghost);
                    e.dataTransfer.setDragImage(ghost, 20, 10);
                    setTimeout(() => document.body.removeChild(ghost), 0);
                };
                row.ondragend = () => { 
                    draggedId = null; 
                    if (currentDragoverFolderRow) {
                        currentDragoverFolderRow.classList.remove('dragover');
                        currentDragoverFolderRow = null;
                    }
                };
            });
        }

        // Ace editor init
        function initAce() {
            aceEditor = ace.edit('editor');
            aceEditor.setTheme('ace/theme/tomorrow_night');
            aceEditor.session.setMode('ace/mode/text');
            aceEditor.setOptions({
                fontSize: '14px',
                showPrintMargin: false,
                enableBasicAutocompletion: true,
                enableLiveAutocompletion: true
            });
            aceEditor.setReadOnly(false);
            const firstFile = items.find(it => it.type === 'file');
            if (firstFile) selectFile(firstFile.id);
        }

        function selectFile(id) {
            const file = getItem(id);
            if (!file || file.type !== 'file') return;
            selectedFileId = id;
            aceEditor.session.setValue(file.content || '');
            const ext = file.name.split('.').pop();
            let mode = 'ace/mode/text';
            if (ext === 'simple') mode = 'ace/mode/text';
            else if (ext === 'html' || ext === 'htm') mode = 'ace/mode/html';
            else if (ext === 'css') mode = 'ace/mode/css';
            else if (ext === 'js') mode = 'ace/mode/javascript';
            else if (ext === 'json') mode = 'ace/mode/json';
            else if (ext === 'md') mode = 'ace/mode/markdown';
            aceEditor.session.setMode(mode);
            document.getElementById('status').innerHTML = `📄 editing ${file.name}`;
            renderTree();
        }

        function saveCurrentFile() {
            if (!selectedFileId) { alert('No file selected'); return; }
            const file = getItem(selectedFileId);
            if (file && file.type === 'file') {
                file.content = aceEditor.session.getValue();
                document.getElementById('status').innerHTML = `💾 saved ${file.name}`;
                renderTree(); 
            }
        }

        function newFile() {
            let parentId = 'root';
            if (selectedFileId) {
                const sel = getItem(selectedFileId);
                if (sel.type === 'folder') parentId = sel.id;
                else parentId = sel.parent;
            }
            const name = prompt('Enter file name (with extension):', 'newgame.simple');
            if (!name) return;
            const newId = genId();
            items.push({
                id: newId,
                name: name,
                type: 'file',
                parent: parentId,
                content: '// new SimpleGame\nPlayer: @pos=(100,100)@ $speed=5\n'
            });
            renderTree();
            selectFile(newId);
        }

        function newFolder() {
            let parentId = 'root';
            if (selectedFileId) {
                const sel = getItem(selectedFileId);
                if (sel.type === 'folder') parentId = sel.id;
                else parentId = sel.parent;
            }
            const name = prompt('Folder name:', 'assets');
            if (!name) return;
            items.push({
                id: genId(),
                name: name,
                type: 'folder',
                parent: parentId,
                content: null
            });
            renderTree();
        }

        function deleteSelected() {
            if (!selectedFileId) { alert('select a file/folder to delete'); return; }
            if (selectedFileId === 'root') { alert('cannot delete root'); return; }
            if (!confirm('Permanently delete? This will also delete all children.')) return;
            const idsToDelete = new Set();
            function collect(id) {
                idsToDelete.add(id);
                getChildren(id).forEach(child => collect(child.id));
            }
            collect(selectedFileId);
            items = items.filter(it => !idsToDelete.has(it.id));
            selectedFileId = null;
            aceEditor.session.setValue('// item deleted');
            renderTree();
        }

        // ---------- VALIDATE WITH SECURE.JS (ADVANCED) ----------
        async function validateSyntax() {
            if (!selectedFileId) {
                alert('Select a .simple file first');
                return;
            }
            const file = getItem(selectedFileId);
            if (!file.name.endsWith('.simple')) {
                alert('Validation only applies to .simple files');
                return;
            }
            const code = aceEditor.session.getValue();
            document.getElementById('validationMsg').innerHTML = '⏳ validating...';
            try {
                const response = await fetch('/.netlify/functions/secure', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });
                const result = await response.json();
                if (response.ok) {
                    if (result.valid) {
                        document.getElementById('validationMsg').innerHTML = '✅ valid syntax';
                    } else {
                        document.getElementById('validationMsg').innerHTML = '❌ ' + (result.error || 'invalid syntax');
                    }
                } else {
                    document.getElementById('validationMsg').innerHTML = '❌ validation error';
                }
            } catch (err) {
                document.getElementById('validationMsg').innerHTML = '❌ network error';
            }
        }

        // ---------- PUSH TO GITHUB (with subdir) ----------
        async function pushToGitHub() {
            const files = items.filter(it => it.type === 'file' && it.id !== 'root');
            function buildPath(itemId) {
                const item = getItem(itemId);
                if (!item) return '';
                const pathParts = [];
                let cur = item;
                while (cur && cur.id !== 'root') {
                    pathParts.unshift(cur.name);
                    cur = getItem(cur.parent);
                }
                return pathParts.join('/');
            }
            const fileMap = {};
            files.forEach(f => {
                const path = buildPath(f.id);
                fileMap[path] = f.content || '';
            });
            document.getElementById('status').innerHTML = '⏳ pushing to GitHub...';
            try {
                const response = await fetch('/.netlify/functions/push-to-github', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        files: fileMap,
                        subdir: 'SimpleGames'   // <-- target subfolder
                    })
                });
                const result = await response.json();
                if (response.ok) {
                    document.getElementById('status').innerHTML = '✅ push successful!';
                } else {
                    document.getElementById('status').innerHTML = '❌ push error: ' + (result.error || 'unknown');
                }
            } catch (err) {
                document.getElementById('status').innerHTML = '❌ network error: ' + err.message;
            }
        }

        // ---------- SOUND / VIDEO TOGGLES ----------
        const bgMusic = document.getElementById('bgMusic');
        const bgVideo = document.getElementById('bgVideo');
        let musicPlaying = false;
        let videoMuted = true; // start muted

        document.getElementById('musicToggle').onclick = () => {
            if (musicPlaying) {
                bgMusic.pause();
                musicPlaying = false;
                document.getElementById('musicToggle').innerHTML = '<i class="fas fa-music"></i>';
            } else {
                bgMusic.play().catch(e => console.log('Autoplay prevented, user must interact first.'));
                musicPlaying = true;
                document.getElementById('musicToggle').innerHTML = '<i class="fas fa-volume-up"></i>';
            }
        };

        document.getElementById('videoToggle').onclick = () => {
            if (videoMuted) {
                bgVideo.muted = false;
                videoMuted = false;
                document.getElementById('videoToggle').innerHTML = '<i class="fas fa-video"></i>';
            } else {
                bgVideo.muted = true;
                videoMuted = true;
                document.getElementById('videoToggle').innerHTML = '<i class="fas fa-video-slash"></i>';
            }
        };

        // Try to autoplay music after any user click (browser policy)
        document.body.addEventListener('click', function initAudio() {
            if (!musicPlaying) {
                bgMusic.play().catch(() => {});
                musicPlaying = true;
                document.getElementById('musicToggle').innerHTML = '<i class="fas fa-volume-up"></i>';
            }
            document.body.removeEventListener('click', initAudio);
        }, { once: true });

        // ---------- INITIALISE ----------
        window.onload = function() {
            initAce();
            renderTree();
            document.getElementById('newFileBtn').onclick = newFile;
            document.getElementById('newFolderBtn').onclick = newFolder;
            document.getElementById('deleteBtn').onclick = deleteSelected;
            document.getElementById('saveBtn').onclick = saveCurrentFile;
            document.getElementById('validateBtn').onclick = validateSyntax;
            document.getElementById('pushBtn').onclick = pushToGitHub;
            document.addEventListener('click', (e) => {
                const row = e.target.closest('.item-row');
                if (!row) return;
                const li = row.closest('.tree-node');
                if (li) {
                    const id = li.dataset.id;
                    const item = getItem(id);
                    if (item && item.type === 'file') selectFile(id);
                }
            });
        };
    })();
</script>

<!-- ========== NETLIFY FUNCTIONS (place in /netlify/functions/) ========== -->

<!-- 1. secure.js – ADVANCED VALIDATOR for all extended syntax features -->
<!--
const { strict } = require('assert');

class SimpleValidator {
  constructor(code) {
    this.code = code;
    this.lines = code.split('\n');
    this.errors = [];
    this.warnings = [];
    this.notes = {};
    this.symbols = {          // symbol table
      variables: new Set(),   // variable names
      objects: new Set(),     // e.g. Player, Enemy
      sprites: new Set(),
      sounds: new Set(),
      animations: new Set(),
      behaviors: new Set(),
      particles: new Set(),
      cameras: new Set(),
      levels: new Map(),      // level name -> { width, height, tiles }
    };
    this.currentLine = 0;
  }

  error(msg) {
    this.errors.push(`Line ${this.currentLine+1}: ${msg}`);
  }

  warn(msg) {
    this.warnings.push(`Line ${this.currentLine+1}: ${msg}`);
  }

  // Main entry
  validate() {
    // First pass: collect all section headers and top-level declarations
    const lines = this.lines;
    let i = 0;
    const sectionPattern = /^([A-Za-z][A-Za-z0-9_]*)\s*:/;
    const varPattern = /^Var\s*:/;
    const objectPattern = /^(Player|Enemy|NPC)\s*:/;
    const levelPattern = /^Level_(\d+)\s*:/;
    const animPattern = /^Anim_([A-Za-z0-9_]+)\s*:/;
    const particlePattern = /^ParticleSystem\s+([A-Za-z0-9_]+)\s*:/;
    const behaviorPattern = /^Behavior\s+([A-Za-z0-9_]+)\s*:/;
    const cameraPattern = /^Camera\s*:/;
    const eventPattern = /^On([A-Z][a-z]+)\s*:/;
    const ifPattern = /^If\s+(.+?)\s*-\s*True\s*:/;

    while (i < lines.length) {
      const line = lines[i].trim();
      this.currentLine = i;

      if (line === '' || line.startsWith('//')) {
        i++;
        continue;
      }

      // Var section
      if (varPattern.test(line)) {
        i = this.parseVarSection(i);
      }
      // Object (Player, Enemy)
      else if (objectPattern.test(line)) {
        const match = line.match(/^(Player|Enemy|NPC)\s*:/);
        const objName = match[1];
        this.symbols.objects.add(objName);
        // parse rest of line and possibly multiline?
        i = this.parseObjectLine(i, objName);
      }
      // Level
      else if (levelPattern.test(line)) {
        const match = line.match(/^Level_(\d+)\s*:/);
        const levelId = match[1];
        i = this.parseLevel(i, levelId);
      }
      // Animation
      else if (animPattern.test(line)) {
        const match = line.match(/^Anim_([A-Za-z0-9_]+)\s*:/);
        const animName = match[1];
        this.symbols.animations.add(animName);
        i = this.parseAnimation(i, animName);
      }
      // ParticleSystem
      else if (particlePattern.test(line)) {
        const match = line.match(/^ParticleSystem\s+([A-Za-z0-9_]+)\s*:/);
        const psName = match[1];
        this.symbols.particles.add(psName);
        i = this.parseParticleSystem(i, psName);
      }
      // Behavior
      else if (behaviorPattern.test(line)) {
        const match = line.match(/^Behavior\s+([A-Za-z0-9_]+)\s*:/);
        const behName = match[1];
        this.symbols.behaviors.add(behName);
        i = this.parseBehavior(i, behName);
      }
      // Camera
      else if (cameraPattern.test(line)) {
        this.symbols.cameras.add('camera');
        i = this.parseCamera(i);
      }
      // Event (OnCollision, etc.)
      else if (eventPattern.test(line)) {
        i = this.parseEvent(i);
      }
      // Conditional If
      else if (ifPattern.test(line)) {
        i = this.parseIfBlock(i);
      }
      // Sprites, Music, Sound sections
      else if (/^(Sprites|Music|Sound):/.test(line)) {
        i = this.parseResourceSection(i, line.split(':')[0]);
      }
      // Physics section
      else if (/^Physics:/.test(line)) {
        i = this.parsePhysics(i);
      }
      // Win/Lose conditions
      else if (/^(WinCondition|LoseCondition):/.test(line)) {
        i = this.parseCondition(i);
      }
      else {
        // unknown top-level, maybe error
        this.warn(`Unknown top-level section: ${line}`);
        i++;
      }
    }

    // After parsing, run semantic checks
    this.checkReferences();

    return {
      valid: this.errors.length === 0,
      errors: this.errors,
      warnings: this.warnings,
      notes: this.notes
    };
  }

  // ---------- Section parsers ----------

  parseVarSection(startLine) {
    let i = startLine + 1;
    while (i < this.lines.length) {
      const line = this.lines[i].trim();
      this.currentLine = i;
      if (line === '' || line.startsWith('//')) {
        i++;
        continue;
      }
      // Var lines: @var=expr@  (or multiple)
      const atMatches = [...line.matchAll(/@([^@]+)@/g)];
      if (atMatches.length === 0) {
        // end of section (next section starts with word:)
        if (/^[A-Za-z][A-Za-z0-9_]*\s*:/.test(line)) break;
        this.warn(`Expected @...@ in Var section`);
        i++;
        continue;
      }
      for (const m of atMatches) {
        const expr = m[1].trim();
        // simple assignment: id = value
        if (!expr.includes('=')) {
          this.error(`Variable assignment must contain '=': ${expr}`);
        } else {
          const [id, val] = expr.split('=').map(s => s.trim());
          if (!/^[A-Za-z_][A-Za-z0-9_]*$/.test(id)) {
            this.error(`Invalid variable name: ${id}`);
          } else {
            this.symbols.variables.add(id);
            // type/value check can be added
          }
        }
      }
      i++;
    }
    return i;
  }

  parseObjectLine(startLine, objName) {
    let line = this.lines[startLine].trim();
    // parse inline @...@ and $... directives
    this.parseInlineDirectives(line, objName);
    // could be multiline if next lines indented?
    return startLine + 1;
  }

  parseLevel(startLine, levelId) {
    let i = startLine + 1;
    let width = null, height = null;
    let tilesStart = -1;
    // first lines may contain @width=xx@ @height=xx@
    while (i < this.lines.length) {
      const line = this.lines[i].trim();
      this.currentLine = i;
      if (line === '' || line.startsWith('//')) {
        i++;
        continue;
      }
      if (line.startsWith('tiles:')) {
        tilesStart = i + 1;
        break;
      }
      // parse @...@ pairs
      const atMatches = [...line.matchAll(/@([^@]+)@/g)];
      for (const m of atMatches) {
        const expr = m[1].trim();
        if (expr.startsWith('width=')) width = parseInt(expr.substring(6));
        else if (expr.startsWith('height=')) height = parseInt(expr.substring(7));
        else if (expr.startsWith('background=')) { /* string OK */ }
        else if (expr.startsWith('music=')) { /* string OK */ }
        else this.warn(`Unknown level attribute: ${expr}`);
      }
      i++;
    }
    if (tilesStart === -1) {
      this.error(`Level ${levelId} missing 'tiles:' section`);
      return i;
    }
    // read tile rows until next section or empty line
    let rows = [];
    let j = tilesStart;
    while (j < this.lines.length) {
      const line = this.lines[j].trim();
      if (line === '' || /^[A-Za-z][A-Za-z0-9_]*\s*:/.test(line)) break;
      if (!line.startsWith('//')) {
        rows.push(line);
      }
      j++;
    }
    if (!width || !height) {
      this.error(`Level ${levelId} must define width and height via @...@`);
    } else {
      if (rows.length !== height) {
        this.error(`Level ${levelId} expects ${height} rows, found ${rows.length}`);
      }
      let playerCount = 0;
      rows.forEach((row, idx) => {
        if (row.length !== width) {
          this.error(`Level ${levelId} row ${idx+1} has ${row.length} tiles, expected ${width}`);
        }
        if (!/^[01PE]+$/.test(row)) {
          this.error(`Level ${levelId} row ${idx+1} contains invalid characters (only 0,1,P,E)`);
        }
        playerCount += (row.match(/P/g) || []).length;
      });
      if (playerCount !== 1) {
        this.error(`Level ${levelId} must have exactly one player start (P)`);
      }
    }
    return j;
  }

  parseAnimation(startLine, animName) {
    let i = startLine + 1;
    while (i < this.lines.length) {
      const line = this.lines[i].trim();
      this.currentLine = i;
      if (line === '' || line.startsWith('//')) {
        i++;
        continue;
      }
      if (/^[A-Za-z][A-Za-z0-9_]*\s*:/.test(line)) break; // next section
      this.parseInlineDirectives(line, 'anim');
      i++;
    }
    return i;
  }

  parseParticleSystem(startLine, psName) {
    let i = startLine + 1;
    while (i < this.lines.length) {
      const line = this.lines[i].trim();
      this.currentLine = i;
      if (line === '' || line.startsWith('//')) {
        i++;
        continue;
      }
      if (/^[A-Za-z][A-Za-z0-9_]*\s*:/.test(line)) break;
      this.parseInlineDirectives(line, 'particle');
      i++;
    }
    return i;
  }

  parseBehavior(startLine, behName) {
    let i = startLine + 1;
    let inStates = false;
    while (i < this.lines.length) {
      const line = this.lines[i].trim();
      this.currentLine = i;
      if (line === '' || line.startsWith('//')) {
        i++;
        continue;
      }
      if (line.startsWith('states:')) {
        inStates = true;
        i++;
        continue;
      }
      if (inStates) {
        if (line.match(/^[a-z]+\s*:/)) {
          // state definition
          this.parseInlineDirectives(line, 'state');
        } else if (line.startsWith('on_')) {
          // transition
        } else if (/^[A-Za-z][A-Za-z0-9_]*\s*:/.test(line)) {
          inStates = false;
          break;
        }
      } else {
        if (/^[A-Za-z][A-Za-z0-9_]*\s*:/.test(line)) break;
        this.parseInlineDirectives(line, 'behavior');
      }
      i++;
    }
    return i;
  }

  parseCamera(startLine) {
    let i = startLine + 1;
    while (i < this.lines.length) {
      const line = this.lines[i].trim();
      this.currentLine = i;
      if (line === '' || line.startsWith('//')) {
        i++;
        continue;
      }
      if (/^[A-Za-z][A-Za-z0-9_]*\s*:/.test(line)) break;
      this.parseInlineDirectives(line, 'camera');
      i++;
    }
    return i;
  }

  parseEvent(startLine) {
    let i = startLine;
    const line = this.lines[i].trim();
    this.currentLine = i;
    // format: OnCollision: @list@ $action $action ...
    const atMatch = line.match(/@([^@]+)@/);
    if (atMatch) {
      const list = atMatch[1].split(',').map(s => s.trim());
      list.forEach(obj => {
        if (!this.symbols.objects.has(obj) && obj !== 'Bullet' && obj !== 'Player' && obj !== 'Enemy') {
          this.warn(`Object '${obj}' in event not declared (may be built-in)`);
        }
      });
    } else {
      this.error(`Event missing @object list@`);
    }
    // parse $ directives
    this.parseInlineDirectives(line, 'event');
    return i + 1;
  }

  parseIfBlock(startLine) {
    // For simplicity, just parse the condition and then the indented block
    let i = startLine + 1;
    while (i < this.lines.length) {
      const line = this.lines[i].trim();
      this.currentLine = i;
      if (line === '' || line.startsWith('//')) {
        i++;
        continue;
      }
      if (/^[A-Za-z][A-Za-z0-9_]*\s*:/.test(line)) break;
      // inside block, expect $ directives
      this.parseInlineDirectives(line, 'if');
      i++;
    }
    return i;
  }

  parseResourceSection(startLine, sectionName) {
    let i = startLine + 1;
    while (i < this.lines.length) {
      const line = this.lines[i].trim();
      this.currentLine = i;
      if (line === '' || line.startsWith('//')) {
        i++;
        continue;
      }
      if (/^[A-Za-z][A-Za-z0-9_]*\s*:/.test(line)) break;
      // resource lines: name = "path"  or name = value
      const eqIdx = line.indexOf('=');
      if (eqIdx === -1) {
        this.warn(`Expected key = value in ${sectionName}`);
      } else {
        const key = line.substring(0, eqIdx).trim();
        const val = line.substring(eqIdx+1).trim();
        if (sectionName === 'Sprites') this.symbols.sprites.add(key);
        else if (sectionName === 'Music') this.symbols.sounds.add(key);
        else if (sectionName === 'Sound') this.symbols.sounds.add(key);
      }
      i++;
    }
    return i;
  }

  parsePhysics(startLine) {
    let i = startLine + 1;
    while (i < this.lines.length) {
      const line = this.lines[i].trim();
      this.currentLine = i;
      if (line === '' || line.startsWith('//')) {
        i++;
        continue;
      }
      if (/^[A-Za-z][A-Za-z0-9_]*\s*:/.test(line)) break;
      // physics lines: param = @value@
      if (!line.includes('@')) {
        this.warn(`Physics value should be inside @...@: ${line}`);
      }
      i++;
    }
    return i;
  }

  parseCondition(startLine) {
    let line = this.lines[startLine].trim();
    this.currentLine = startLine;
    const atMatch = line.match(/@([^@]+)@/);
    if (!atMatch) {
      this.error(`Win/Lose condition must have @expression@`);
    } else {
      // expression can be validated later
    }
    return startLine + 1;
  }

  // Helper to parse inline @...@ and $... on a single line
  parseInlineDirectives(line, context) {
    const atMatches = [...line.matchAll(/@([^@]+)@/g)];
    for (const m of atMatches) {
      const expr = m[1].trim();
      this.validateExpression(expr, context);
    }
    const dollarMatches = [...line.matchAll(/\$([A-Za-z0-9_]+(?:[=!]=?[^@\s]*)?)/g)];
    for (const m of dollarMatches) {
      const dir = m[1];
      // could validate directive names
    }
  }

  validateExpression(expr, context) {
    // Basic expression validation: check parentheses, known identifiers, operators
    const stack = [];
    for (let i=0; i<expr.length; i++) {
      const ch = expr[i];
      if (ch === '(') stack.push('(');
      else if (ch === ')') {
        if (stack.pop() !== '(') {
          this.error(`Unbalanced parentheses in expression: ${expr}`);
          return;
        }
      }
    }
    if (stack.length) this.error(`Unbalanced parentheses in expression: ${expr}`);

    // Check for undefined variables (identifiers not in symbols)
    const idRegex = /[A-Za-z_][A-Za-z0-9_]*/g;
    let match;
    while ((match = idRegex.exec(expr)) !== null) {
      const id = match[0];
      // ignore numbers and keywords
      if (/^\d+$/.test(id)) continue;
      if (['sin','cos','clamp','random','true','false'].includes(id)) continue;
      if (!this.symbols.variables.has(id) && !this.symbols.objects.has(id)) {
        // might be a parameter, but warn
        this.warn(`Possibly undefined identifier '${id}' in expression`);
      }
    }
  }

  checkReferences() {

  }
}

const { Octokit } = require('@octokit/rest');

exports.handler = async (event) => {
  if (event.httpMethod !== 'POST') {
    return { statusCode: 405, body: JSON.stringify({ error: 'Method not allowed' }) };
  }

  const { files, subdir = '' } = JSON.parse(event.body);
  const token = process.env.GITHUB_TOKEN;
  const owner = process.env.GITHUB_OWNER;
  const repo = process.env.GITHUB_REPO;
  const branch = 'main';

  if (!token || !owner || !repo) {
    return { statusCode: 500, body: JSON.stringify({ error: 'Missing GitHub configuration' }) };
  }

  const octokit = new Octokit({ auth: token });

  try {
    const { data: refData } = await octokit.git.getRef({ owner, repo, ref: `heads/${branch}` });
    const latestCommitSha = refData.object.sha;
    const { data: commitData } = await octokit.git.getCommit({ owner, repo, commit_sha: latestCommitSha });
    const baseTreeSha = commitData.tree.sha;

    const basePath = subdir ? `public/simple-games/${subdir}/` : 'public/simple-games/';
    const tree = await Promise.all(
      Object.entries(files).map(async ([filePath, content]) => {
        const { data: blob } = await octokit.git.createBlob({ owner, repo, content, encoding: 'utf-8' });
        return {
          path: `${basePath}${filePath}`,
          mode: '100644',
          type: 'blob',
          sha: blob.sha,
        };
      })
    );

    const { data: newTree } = await octokit.git.createTree({ owner, repo, base_tree: baseTreeSha, tree });
    const { data: newCommit } = await octokit.git.createCommit({
      owner, repo,
      message: `Auto‑push from SimpleGames studio [skip ci]`,
      tree: newTree.sha,
      parents: [latestCommitSha],
    });
    await octokit.git.updateRef({ owner, repo, ref: `heads/${branch}`, sha: newCommit.sha, force: false });

    return { statusCode: 200, headers: { 'Access-Control-Allow-Origin': '*' }, body: JSON.stringify({ success: true }) };
  } catch (error) {
    console.error('GitHub API error:', error);
    return { statusCode: 500, body: JSON.stringify({ error: error.message }) };
  }
};
