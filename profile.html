<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackArcade · Your Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0e17, #1a1f2f);
            color: #eef2ff;
            min-height: 100vh;
        }
        .nav-bar {
            background: rgba(15,20,35,0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a678ff, #7a5be8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: #b1b9d9;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: white;
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .username {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid rgba(162,142,255,0.3);
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.3s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(162,142,255,0.3);
            border-top-color: #a678ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Profile Header */
        .profile-header {
            background: rgba(20,25,45,0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7a5be8, #a678ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .profile-info {
            flex: 1;
        }
        .profile-info h2 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #cbd0ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .profile-info .member-since {
            color: #b1b9d9;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        .profile-stats {
            display: flex;
            gap: 3rem;
            margin-top: 1rem;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #a678ff;
        }
        .stat-label {
            color: #929cce;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Regenerate Button */
        .regenerate-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(162,142,255,0.3);
            border-radius: 40px;
            padding: 0.8rem 1.5rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
            margin-left: auto;
        }
        .regenerate-btn:hover {
            background: rgba(162,142,255,0.2);
            border-color: #a678ff;
        }
        
        /* Tabs */
        .profile-tabs {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }
        .tab {
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tab:hover {
            background: rgba(255,255,255,0.1);
        }
        .tab.active {
            background: #4a40bf;
            color: white;
        }
        
        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .game-card {
            background: rgba(20,25,45,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 1.5rem;
            transition: 0.2s;
        }
        .game-card:hover {
            background: rgba(30,35,55,0.7);
            border-color: rgba(162,142,255,0.3);
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .game-name {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .game-score {
            color: #a678ff;
            font-weight: bold;
            font-size: 1.3rem;
        }
        .game-date {
            color: #929cce;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        
        /* Achievements Grid */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .achievement-card {
            background: rgba(20,25,45,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: 0.2s;
        }
        .achievement-card.locked {
            opacity: 0.5;
        }
        .achievement-icon {
            font-size: 2rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(162,142,255,0.1);
            border-radius: 50%;
        }
        .achievement-info {
            flex: 1;
        }
        .achievement-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .achievement-desc {
            font-size: 0.8rem;
            color: #929cce;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #b1b9d9;
            grid-column: 1 / -1;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div>Creating your profile...</div>
    </div>

    <div class="nav-bar">
        <div class="logo">🎮 PackArcade</div>
        <div class="nav-links">
            <a href="/"><i class="fas fa-home"></i> Games</a>
            <a href="/leaderboard.html"><i class="fas fa-chart-line"></i> Leaderboard</a>
            <a href="/challenges.html"><i class="fas fa-trophy"></i> Challenges</a>
            <a href="/profile.html" class="active"><i class="fas fa-user"></i> Profile</a>
        </div>
        <div class="user-menu">
            <span class="username" id="usernameDisplay">Loading...</span>
        </div>
    </div>

    <div class="container">
        <!-- Profile Header -->
        <div class="profile-header" id="profileHeader">
            <div class="profile-avatar" id="profileAvatar">?</div>
            <div class="profile-info">
                <h2 id="profileName">Loading...</h2>
                <div class="member-since" id="memberSince">Member since ...</div>
                <div class="profile-stats" id="profileStats">
                    <div class="stat">
                        <div class="stat-value" id="gamesPlayed">0</div>
                        <div class="stat-label">Games Played</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="highScores">0</div>
                        <div class="stat-label">High Scores</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="totalScore">0</div>
                        <div class="stat-label">Total Points</div>
                    </div>
                </div>
            </div>
            <button class="regenerate-btn" id="regenerateBtn">
                <i class="fas fa-dice"></i> Generate New Username
            </button>
        </div>

        <!-- Tabs -->
        <div class="profile-tabs">
            <div class="tab active" data-tab="games"><i class="fas fa-gamepad"></i> Recent Games</div>
            <div class="tab" data-tab="achievements"><i class="fas fa-trophy"></i> Achievements</div>
        </div>

        <!-- Recent Games Tab -->
        <div id="gamesTab" class="tab-content">
            <div class="games-grid" id="gamesGrid">
                <div class="empty-state">Loading your games...</div>
            </div>
        </div>

        <!-- Achievements Tab -->
        <div id="achievementsTab" class="tab-content hidden">
            <div class="achievements-grid" id="achievementsGrid">
                <!-- Will be populated by JS -->
            </div>
        </div>
    </div>

    <script>
        (function() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            
            // ========== AUTO-GENERATE USERNAME FUNCTION ==========
            async function generateAndRegisterUsername() {
                // Show loading
                loadingOverlay.classList.remove('hidden');
                
                // Generate random username
                const adjectives = ['Swift', 'Silent', 'Mighty', 'Fierce', 'Shadow', 'Crimson', 'Azure', 'Phantom', 'Blazing', 'Frost', 'Neon', 'Cyber', 'Pixel', 'Quantum', 'Sonic'];
                const nouns = ['Phoenix', 'Tiger', 'Eagle', 'Wolf', 'Dragon', 'Viper', 'Falcon', 'Raven', 'Shark', 'Panther', 'Hunter', 'Knight', 'Ninja', 'Samurai', 'Wizard'];
                const numbers = Math.floor(1000 + Math.random() * 9000);
                
                const username = adjectives[Math.floor(Math.random() * adjectives.length)] + 
                                nouns[Math.floor(Math.random() * nouns.length)] + 
                                numbers;
                
                try {
                    // Register in database via Netlify function
                    const response = await fetch('/.netlify/functions/register-player', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username })
                    });
                    
                    if (!response.ok) {
                        throw new Error('Failed to register');
                    }
                    
                    const data = await response.json();
                    
                    // Store in localStorage
                    localStorage.setItem('packarcade_username', username);
                    localStorage.setItem('packarcade_player_id', data.id);
                    
                    // Update UI
                    document.getElementById('usernameDisplay').textContent = username;
                    document.getElementById('profileName').textContent = username;
                    document.getElementById('profileAvatar').textContent = username.charAt(0);
                    
                    // Load profile data
                    await loadProfileData(username);
                    
                } catch (error) {
                    console.error('Registration error:', error);
                    // Fallback - still save locally
                    localStorage.setItem('packarcade_username', username);
                    document.getElementById('usernameDisplay').textContent = username;
                    document.getElementById('profileName').textContent = username;
                    document.getElementById('profileAvatar').textContent = username.charAt(0);
                } finally {
                    loadingOverlay.classList.add('hidden');
                }
            }

            // ========== LOAD PROFILE DATA ==========
            async function loadProfileData(username) {
                try {
                    // Fetch player stats
                    const statsRes = await fetch(`/.netlify/functions/get-player-stats?username=${encodeURIComponent(username)}`);
                    const stats = await statsRes.json();
                    
                    if (stats) {
                        document.getElementById('gamesPlayed').textContent = stats.games_played || 0;
                        document.getElementById('highScores').textContent = stats.high_scores || 0;
                        document.getElementById('totalScore').textContent = (stats.total_score || 0).toLocaleString();
                        
                        if (stats.created_at) {
                            const date = new Date(stats.created_at);
                            document.getElementById('memberSince').textContent = `Member since ${date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}`;
                        }
                    }
                    
                    // Fetch recent games
                    const gamesRes = await fetch(`/.netlify/functions/get-player-games?username=${encodeURIComponent(username)}`);
                    const games = await gamesRes.json();
                    
                    const gamesGrid = document.getElementById('gamesGrid');
                    if (games && games.length > 0) {
                        gamesGrid.innerHTML = games.map(game => `
                            <div class="game-card">
                                <div class="game-header">
                                    <span class="game-name">${game.game_slug}</span>
                                    <span class="game-score">${game.score.toLocaleString()}</span>
                                </div>
                                <div class="game-date">${new Date(game.created_at).toLocaleDateString()}</div>
                            </div>
                        `).join('');
                    } else {
                        gamesGrid.innerHTML = '<div class="empty-state">No games played yet. Start playing!</div>';
                    }
                    
                } catch (error) {
                    console.error('Error loading profile data:', error);
                }
            }

            // ========== INITIALIZATION ==========
            async function initProfile() {
                let username = localStorage.getItem('packarcade_username');
                
                if (!username) {
                    // No username exists - generate one
                    await generateAndRegisterUsername();
                } else {
                    // Username exists - load profile
                    document.getElementById('usernameDisplay').textContent = username;
                    document.getElementById('profileName').textContent = username;
                    document.getElementById('profileAvatar').textContent = username.charAt(0);
                    
                    // Try to ensure it's registered in database
                    try {
                        await fetch('/.netlify/functions/register-player', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username })
                        });
                    } catch (e) {
                        // Ignore - probably already exists
                    }
                    
                    await loadProfileData(username);
                }
            }

            // ========== REGENERATE USERNAME ==========
            document.getElementById('regenerateBtn').addEventListener('click', async () => {
                if (confirm('Generate a new username? Your old scores will still be linked to your old username.')) {
                    await generateAndRegisterUsername();
                }
            });

            // ========== TAB SWITCHING ==========
            const tabs = document.querySelectorAll('.tab');
            const gamesTab = document.getElementById('gamesTab');
            const achievementsTab = document.getElementById('achievementsTab');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    if (tab.dataset.tab === 'games') {
                        gamesTab.classList.remove('hidden');
                        achievementsTab.classList.add('hidden');
                    } else {
                        gamesTab.classList.add('hidden');
                        achievementsTab.classList.remove('hidden');
                    }
                });
            });

            // ========== ACHIEVEMENTS (Static for now) ==========
            const achievements = [
                { icon: '🏆', name: 'First Win', desc: 'Complete your first game', unlocked: false },
                { icon: '⭐', name: 'High Scorer', desc: 'Score 10,000 points', unlocked: false },
                { icon: '🎯', name: 'Sharpshooter', desc: '100% accuracy', unlocked: false },
                { icon: '🚀', name: 'Space Explorer', desc: 'Play 10 space games', unlocked: false },
                { icon: '🧩', name: 'Puzzle Master', desc: 'Complete 20 puzzles', unlocked: false },
                { icon: '⚡', name: 'Speed Demon', desc: 'Achieve 5x combo', unlocked: false }
            ];
            
            const achievementsGrid = document.getElementById('achievementsGrid');
            achievementsGrid.innerHTML = achievements.map(ach => `
                <div class="achievement-card locked">
                    <div class="achievement-icon">${ach.icon}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${ach.name}</div>
                        <div class="achievement-desc">${ach.desc}</div>
                    </div>
                </div>
            `).join('');

            // Start the profile initialization
            initProfile();
        })();
    </script>
</body>
</html>
