[build]
  publish = "."

# === FUNCTIONS FIRST - THIS IS CRITICAL ===
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# === DYNAMIC SUBDOMAIN HANDLER ===
# This catches ANY subdomain not explicitly listed below
# and serves from /public/imagine/[subdomain]/
[[redirects]]
  from = "https://*.packarcade.xyz/*"
  to = "/public/imagine/:splat/index.html"
  status = 200
  force = true
  conditions = {Path = ["/*"]}

# === COLON-BASED ROUTING (:Root.LeaderBoard) ===
[[redirects]]
  from = "https://root.leaderboard.packarcade.xyz/*"
  to = "/leaderboard.html"
  status = 200
  force = true

[[redirects]]
  from = "https://root.challenges.packarcade.xyz/*"
  to = "/challenges.html"
  status = 200
  force = true

[[redirects]]
  from = "https://root.profile.packarcade.xyz/*"
  to = "/profile.html"
  status = 200
  force = true

# === messed up url (.....messed.up.urls) ===
[[redirects]]
  from = "https://root.foot.nut.cut.dut.fuck.index.packarcade.xyz/*"
  to = "/public/root-index/:splat"
  status = 200
  force = true

