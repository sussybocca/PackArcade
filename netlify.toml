  from = "packarcade.xyz/*"
  to = "/index.html"
  status = 200
  force = true

# === EDGE FUNCTIONS ===
[[edge_functions]]
  path = "/*"
  function = "doorway-router"

[[edge_functions]]
  path = "/*"
  function = "language-router"

[[edge_functions]]
  path = "/*"
  function = "game-version-router"

[[edge_functions]]
  path = "/*"
  function = "creative-router"

# === ERROR PAGES (must be last) ===
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# === CACHE HEADERS ===
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.simple"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=3600"
