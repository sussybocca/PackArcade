[[redirects]]
  from = "https://ageofwar.packarcade.xyz/*"
  to = "/public/imagine/ageofwar.html"
  status = 200
  force = true

# Fallback: if subdomain not listed, redirect to main site
[[redirects]]
  from = "https://*.packarcade.xyz/*"
  to = "https://packarcade.xyz"
  status = 302
  force = true

# Main domain
[[redirects]]
  from = "packarcade.xyz/*"
  to = "/index.html"
  status = 200
  force = true

# Error pages
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Cache headers
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.simple"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=3600"
