name: Auto‑link Imagine & SimpleGames Files

on:
  push:
    paths:
      - 'public/imagine/**'          # triggers for any change inside imagine/
      - 'public/imagine/SimpleGames/**'     # also watch the simple-games folder
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-selector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install HTML parser
        run: npm install --no-save --no-package-lock node-html-parser

      - name: Update selector.html with new imagine and simple files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { parse } = require('node-html-parser');

            const selectorPath = 'public/selector.html';
            const imagineDir = 'public/imagine';
            const simpleDir = 'public/simple-games';

            // 1. Read the main selector page
            const selectorHtml = fs.readFileSync(selectorPath, 'utf8');
            const root = parse(selectorHtml);

            // 2. Find the <script> that contains the cardsData array
            const scripts = root.querySelectorAll('script');
            let cardsDataScript = null;
            for (const script of scripts) {
              const content = script.textContent || script.innerHTML;
              if (content.includes('const cardsData = [')) {
                cardsDataScript = script;
                break;
              }
            }
            if (!cardsDataScript) {
              core.setFailed('Could not find cardsData array in selector.html');
              return;
            }

            // 3. Parse the existing cardsData array
            const scriptContent = cardsDataScript.textContent;
            const match = scriptContent.match(/const cardsData = (\[[\s\S]*?\]);/);
            if (!match) {
              core.setFailed('Failed to extract cardsData array');
              return;
            }
            const cardsDataStr = match[1];
            let cardsData;
            try {
              cardsData = eval('(' + cardsDataStr + ')');
            } catch (e) {
              core.setFailed('Error parsing cardsData: ' + e.message);
              return;
            }

            // ---------- Helper: extract metadata from .simple files ----------
            function extractSimpleMetadata(filePath) {
              try {
                const content = fs.readFileSync(filePath, 'utf8');
                const lines = content.split('\n');
                let title = null;
                let description = null;
                let category = 'demos';
                for (const line of lines) {
                  if (line.startsWith('//')) {
                    const lower = line.toLowerCase();
                    if (lower.includes('title:')) {
                      title = line.replace(/\/\/\s*title:\s*/i, '').trim();
                    } else if (lower.includes('description:')) {
                      description = line.replace(/\/\/\s*description:\s*/i, '').trim();
                    } else if (lower.includes('category:')) {
                      category = line.replace(/\/\/\s*category:\s*/i, '').trim().toLowerCase();
                    }
                  }
                  // stop after first few lines if we have all
                  if (title && description && category) break;
                }
                if (!title) title = path.basename(filePath, '.simple').replace(/[-_]/g, ' ') + ' Simple Game';
                if (!description) description = 'A game built with the SimpleGames custom syntax.';
                return { title, description, category };
              } catch {
                return null;
              }
            }

            // ---------- Helper: extract metadata from HTML files (existing) ----------
            function extractHtmlMetadata(filePath) {
              try {
                const content = fs.readFileSync(filePath, 'utf8');
                const doc = parse(content);
                const titleTag = doc.querySelector('title');
                const title = titleTag ? titleTag.text.trim() : null;
                const metaDesc = doc.querySelector('meta[name="description"]');
                let description = metaDesc ? metaDesc.getAttribute('content') || '' : '';
                if (!description) {
                  const firstP = doc.querySelector('p');
                  if (firstP) description = firstP.text.trim().substring(0, 150) + '…';
                }
                const metaCat = doc.querySelector('meta[name="category"]');
                const category = metaCat ? metaCat.getAttribute('content') || 'demos' : 'demos';
                return { title, description, category };
              } catch {
                return null;
              }
            }

            // ---------- Helper: check if a card already exists ----------
            function cardExists(link) {
              return cardsData.some(card => card.link === link);
            }

            // ---------- Scan imagine/ for HTML files ----------
            function getAllHtmlFiles(dir, baseDir = dir) {
              let results = [];
              if (!fs.existsSync(dir)) return results;
              const list = fs.readdirSync(dir);
              for (const item of list) {
                const fullPath = path.join(dir, item);
                const stat = fs.statSync(fullPath);
                if (stat.isDirectory()) {
                  results = results.concat(getAllHtmlFiles(fullPath, baseDir));
                } else if (item.endsWith('.html') || item.endsWith('.htm')) {
                  const relativePath = path.relative(baseDir, fullPath);
                  results.push({ fullPath, relativePath, type: 'html' });
                }
              }
              return results;
            }

            // ---------- Scan simple-games/ for .simple files ----------
            function getAllSimpleFiles(dir, baseDir = dir) {
              let results = [];
              if (!fs.existsSync(dir)) return results;
              const list = fs.readdirSync(dir);
              for (const item of list) {
                const fullPath = path.join(dir, item);
                const stat = fs.statSync(fullPath);
                if (stat.isDirectory()) {
                  results = results.concat(getAllSimpleFiles(fullPath, baseDir));
                } else if (item.endsWith('.simple')) {
                  const relativePath = path.relative(baseDir, fullPath);
                  results.push({ fullPath, relativePath, type: 'simple' });
                }
              }
              return results;
            }

            // Collect all files
            const htmlFiles = getAllHtmlFiles(imagineDir);
            const simpleFiles = getAllSimpleFiles(simpleDir);
            const allFiles = [...htmlFiles, ...simpleFiles];

            if (allFiles.length === 0) {
              console.log('No files found in imagine/ or simple-games/ – nothing to do.');
              return;
            }

            let addedCount = 0;
            for (const { fullPath, relativePath, type } of allFiles) {
              let link;
              if (type === 'html') {
                link = `imagine/${relativePath.replace(/\\/g, '/')}`;
              } else {
                link = `simple-games/${relativePath.replace(/\\/g, '/')}`;
              }

              if (cardExists(link)) {
                console.log(`Card for ${link} already exists – skipping.`);
                continue;
              }

              let metadata;
              if (type === 'html') {
                metadata = extractHtmlMetadata(fullPath);
              } else {
                metadata = extractSimpleMetadata(fullPath);
              }

              if (!metadata) {
                console.log(`Could not extract metadata from ${fullPath} – skipping.`);
                continue;
              }

              const { title, description, category } = metadata;

              // Default icon based on type
              const icon = type === 'html' ? '📄' : '🎮';

              const newCard = {
                icon: icon,
                title: title,
                description: description,
                features: [
                  type === 'html' ? 'Immersive experience' : 'SimpleGames syntax',
                  type === 'html' ? 'New dimension' : 'Custom game engine',
                  'Interactive content'
                ],
                link: link,
                category: category,
                highlight: false
              };

              cardsData.push(newCard);
              addedCount++;
              console.log(`✅ Added card for ${relativePath} (category: ${category})`);
            }

            if (addedCount === 0) {
              console.log('No new cards to add.');
              return;
            }

            // 6. Replace the cardsData array in the script
            const newCardsDataStr = JSON.stringify(cardsData, null, 2)
              .replace(/"([^"]+)":/g, '$1:'); // remove quotes around keys to match original style

            const updatedScriptContent = scriptContent.replace(
              /const cardsData = \[[\s\S]*?\];/,
              `const cardsData = ${newCardsDataStr};`
            );

            cardsDataScript.textContent = updatedScriptContent;

            // 7. Write the updated HTML back
            fs.writeFileSync(selectorPath, root.toString());
            console.log('selector.html updated successfully.');

      - name: Commit and push changes (only if selector.html changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/selector.html
          if ! git diff --staged --quiet; then
            git commit -m "Auto‑add imagine & simple file links [skip ci]"
            git push
          else
            echo "No changes to selector.html; skipping commit."
          fi
