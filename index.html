<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immersive Game Hub</title>

  <!-- PWA manifest (must be inside head) -->
  <link rel="manifest" href="/manifest.json">

  <!-- Favicon for browser tab -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <!-- Load the AWA enhancer (includes custom install logic & immersive UI) -->
  <script src="/AWA.js" defer></script>

  <style>
    /* Reset everything */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
      position: relative;
    }

    /* Header – slim, floating, no extra space */
    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 0.5rem 1.5rem;
      background: rgba(10, 15, 30, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;       /* allow clicks to pass through to iframe */
    }

    .header h1 {
      font-size: 1.4rem;
      font-weight: 500;
      background: linear-gradient(135deg, #b8bfff, #a678ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }

    .header p {
      color: #a0a8c0;
      font-size: 0.85rem;
    }

    /* Make the install link visible and clickable */
    .install-link {
      position: absolute;
      top: 0.8rem;
      right: 1.5rem;
      z-index: 20;
      color: #fff;
      background: rgba(255,255,255,0.15);
      padding: 0.4rem 1rem;
      border-radius: 30px;
      text-decoration: none;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: auto;       /* make sure it's clickable */
    }
    .install-link:hover {
      background: rgba(255,255,255,0.25);
    }

    /* iframe container – fills entire viewport */
    .iframe-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0e121f;
    }

    /* Footer – tiny overlay at bottom */
    .footer {
      position: absolute;
      bottom: 0.5rem;
      right: 1rem;
      z-index: 10;
      color: #5b6482;
      font-size: 0.7rem;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.2rem; }
      .header p { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <!-- Install link – now styled and clickable -->
  <a href="/launcher.html" class="install-link">⬇️ Install Arcade Web App</a>

  <!-- Minimal header – does not take layout space -->
  <header class="header">
    <h1>⚡ DIMENSION SELECTOR</h1>
    <p>choose your immersive experience</p>
  </header>

  <!-- iframe fills the whole window -->
  <div class="iframe-container">
    <iframe src="public/selector.html" title="Game Selector" loading="lazy"></iframe>
  </div>

  <!-- Tiny footer overlay -->
  <div class="footer">
    <span>✦ auto‑linked from <code>public/imagine/</code> ✦</span>
  </div>

  <!-- Optionally, you could also include a fallback message if AWA.js fails to load -->
</body>
</html>
