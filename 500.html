<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 – PackArcade</title>
    <style>
        @font-face {
            font-family: 'ArcadeFont';
            src: url('/fonts/ArcadeFont.woff2') format('woff2'),
                 url('/fonts/ArcadeFont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'ArcadeFont', 'Courier New', monospace;
            background: #0a0c0f;
            color: #fff;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background: rgba(10, 12, 15, 0.85);
            backdrop-filter: blur(8px);
            padding: 2rem;
            border-left: 4px solid #ffaa00;
            border-right: 4px solid #ffaa00;
            box-shadow: 0 0 40px #ff8800aa;
            margin: 0 10%;
            border-radius: 20px;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            text-shadow: 0 0 20px #ffaa00, 0 0 40px #ffcc66;
            animation: glitch 1.8s infinite;
            line-height: 1;
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; text-shadow: 0 0 20px orange; }
            95% { transform: skew(10deg, -4deg); opacity: 0.7; text-shadow: -5px 0 magenta, 5px 0 cyan; }
            96% { transform: skew(-10deg, 4deg); opacity: 0.8; text-shadow: 5px 0 magenta, -5px 0 cyan; }
            97% { transform: skew(6deg, -2deg); }
        }

        p {
            font-size: 1.8rem;
            max-width: 700px;
            margin: 30px 0;
            color: #ffcc99;
            text-shadow: 0 0 5px #aa5500;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #ffaa00;
        }

        a {
            display: inline-block;
            padding: 15px 40px;
            border: 3px solid #ffaa00;
            color: #ffcc99;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.4rem;
            border-radius: 50px;
            transition: 0.3s;
            background: rgba(0,0,0,0.3);
        }

        a:hover {
            background: #ffaa00;
            color: #0a0c0f;
            box-shadow: 0 0 30px #ffaa00;
            transform: scale(1.05);
        }

        .smoke-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px orange);
            animation: flicker 0.5s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 5rem; }
            p { font-size: 1.3rem; }
            .content { margin: 0 5%; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <canvas id="errorCanvas"></canvas>
    <div class="content">
        <div class="smoke-icon">💥🔥</div>
        <h1>500</h1>
        <p>THE MACHINE IS SMOKING. Something exploded in the server room. Our best engineers are working on it (probably).</p>
        <a href="/">↳ TRY AGAIN</a>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('errorCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            // Chaotic particles – orange and white
            const particles = [];
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    size: Math.random() * 4 + 1,
                    color: `hsl(${Math.random() * 20 + 30}, 100%, 60%)` // orange/yellow
                });
            }

            function draw() {
                ctx.fillStyle = 'rgba(10, 12, 15, 0.2)';
                ctx.fillRect(0, 0, width, height);

                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();

                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;
                });

                // Random chaotic glitches
                if (Math.random() < 0.1) {
                    ctx.fillStyle = 'rgba(255, 200, 0, 0.25)';
                    ctx.fillRect(Math.random() * width * 0.3, Math.random() * height, width * 0.4, Math.random() * 40 + 5);
                }
                if (Math.random() < 0.05) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.fillRect(0, Math.random() * height, width, Math.random() * 15 + 2);
                }

                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>
</html>
