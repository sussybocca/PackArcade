<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackArcade · Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0e17, #1a1f2f);
            color: #eef2ff;
            min-height: 100vh;
        }
        .nav-bar {
            background: rgba(15,20,35,0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a678ff, #7a5be8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: #b1b9d9;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: white;
        }
        .username {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid rgba(162,142,255,0.3);
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fff, #cbd0ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .game-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .game-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            color: #b1b9d9;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-btn:hover, .game-btn.active {
            background: #4a40bf;
            color: white;
            border-color: #7a5be8;
        }
        .leaderboard-table {
            background: rgba(20,25,45,0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 150px 100px;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #929cce;
            font-weight: 600;
        }
        .table-row {
            display: grid;
            grid-template-columns: 80px 1fr 150px 100px;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .table-row:hover {
            background: rgba(255,255,255,0.05);
        }
        .table-row.current-user {
            background: rgba(74,64,191,0.2);
            border-left: 4px solid #7a5be8;
        }
        .rank-1 { color: gold; }
        .rank-2 { color: silver; }
        .rank-3 { color: #cd7f32; }
        .player-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7a5be8, #a678ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .score {
            font-weight: 600;
            color: #a678ff;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="logo">🎮 PackArcade</div>
        <div class="nav-links">
            <a href="/"><i class="fas fa-home"></i> Games</a>
            <a href="/leaderboard.html" class="active"><i class="fas fa-chart-line"></i> Leaderboard</a>
            <a href="/challenges.html"><i class="fas fa-trophy"></i> Challenges</a>
            <a href="/profile.html"><i class="fas fa-user"></i> Profile</a>
        </div>
        <div class="username" id="usernameDisplay">Loading...</div>
    </div>

    <div class="container">
        <h1><i class="fas fa-chart-line"></i> Global Leaderboard</h1>
        
        <div class="game-selector" id="gameSelector">
            <button class="game-btn active" data-game="all">All Games</button>
        </div>
        
        <div class="leaderboard-table">
            <div class="table-header">
                <div>Rank</div>
                <div>Player</div>
                <div>Score</div>
                <div>Date</div>
            </div>
            <div id="leaderboardRows"></div>
        </div>
    </div>

    <script>
        const username = localStorage.getItem('packarcade_username');
        if (!username) {
            window.location.href = '/';
        }
        document.getElementById('usernameDisplay').textContent = username;

        // Load games for selector
        const games = [
            'All Games', 'SpaceShooters', 'Tetris', 'Pacman', 
            'Flappy Bird', 'Cookie Clicker', 'Bitlife', 'Run'
        ];

        const selector = document.getElementById('gameSelector');
        games.forEach(game => {
            if (game === 'All Games') return;
            const btn = document.createElement('button');
            btn.className = 'game-btn';
            btn.dataset.game = game.toLowerCase().replace(/\s+/g, '');
            btn.textContent = game;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadLeaderboard(btn.dataset.game);
            });
            selector.appendChild(btn);
        });

        async function loadLeaderboard(game = 'all') {
            const res = await fetch(`/.netlify/functions/get-leaderboard?game=${game}`);
            const data = await res.json();
            
            const rows = document.getElementById('leaderboardRows');
            rows.innerHTML = '';
            
            data.scores.forEach((entry, index) => {
                const row = document.createElement('div');
                row.className = `table-row ${entry.username === username ? 'current-user' : ''}`;
                
                let rankClass = '';
                if (index === 0) rankClass = 'rank-1';
                else if (index === 1) rankClass = 'rank-2';
                else if (index === 2) rankClass = 'rank-3';
                
                row.innerHTML = `
                    <div class="${rankClass}">#${index + 1}</div>
                    <div class="player-name">
                        <div class="avatar">${entry.username.charAt(0)}</div>
                        ${entry.username}
                    </div>
                    <div class="score">${entry.score.toLocaleString()}</div>
                    <div>${new Date(entry.created_at).toLocaleDateString()}</div>
                `;
                
                rows.appendChild(row);
            });
        }

        loadLeaderboard();
    </script>
</body>
</html>
