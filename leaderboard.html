<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackArcade · Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0e17, #1a1f2f);
            color: #eef2ff;
            min-height: 100vh;
        }
        .nav-bar {
            background: rgba(15,20,35,0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a678ff, #7a5be8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: #b1b9d9;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: white;
        }
        .username {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid rgba(162,142,255,0.3);
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fff, #cbd0ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .game-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .game-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            color: #b1b9d9;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-btn:hover, .game-btn.active {
            background: #4a40bf;
            color: white;
            border-color: #7a5be8;
        }
        .leaderboard-table {
            background: rgba(20,25,45,0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 150px 100px;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #929cce;
            font-weight: 600;
        }
        .table-row {
            display: grid;
            grid-template-columns: 80px 1fr 150px 100px;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .table-row:hover {
            background: rgba(255,255,255,0.05);
        }
        .table-row.current-user {
            background: rgba(74,64,191,0.2);
            border-left: 4px solid #7a5be8;
        }
        .rank-1 { color: gold; }
        .rank-2 { color: silver; }
        .rank-3 { color: #cd7f32; }
        .player-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7a5be8, #a678ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .score {
            font-weight: 600;
            color: #a678ff;
        }
        .loading, .error-message, .empty-message {
            text-align: center;
            padding: 2rem;
            color: #b1b9d9;
            font-size: 1.2rem;
        }
        .error-message {
            color: #ff7b7b;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            align-items: center;
        }
        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            color: #b1b9d9;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .page-btn:hover:not(:disabled) {
            background: #4a40bf;
            color: white;
            border-color: #7a5be8;
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .page-info {
            color: #b1b9d9;
            font-size: 0.9rem;
        }
        .entries-per-page {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-left: auto;
        }
        .entries-per-page select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 0.3rem 1rem;
            color: white;
            cursor: pointer;
        }
        .debug-info {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-family: monospace;
            font-size: 0.8rem;
            color: #ffaa00;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
        }
        .debug-info.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="logo">🎮 PackArcade</div>
        <div class="nav-links">
            <a href="/"><i class="fas fa-home"></i> Games</a>
            <a href="/leaderboard.html" class="active"><i class="fas fa-chart-line"></i> Leaderboard</a>
            <a href="/challenges.html"><i class="fas fa-trophy"></i> Challenges</a>
            <a href="/profile.html"><i class="fas fa-user"></i> Profile</a>
        </div>
        <div class="username" id="usernameDisplay">Guest</div>
    </div>

    <div class="container">
        <h1><i class="fas fa-chart-line"></i> Global Leaderboard</h1>
        
        <div class="debug-info" id="debugInfo"></div>
        
        <div class="game-selector" id="gameSelector">
            <button class="game-btn active" data-game="all">All Games</button>
        </div>
        
        <div class="leaderboard-table">
            <div class="table-header">
                <div>Rank</div>
                <div>Player</div>
                <div>Score</div>
                <div>Date</div>
            </div>
            <div id="leaderboardRows">
                <div class="loading">Loading leaderboard...</div>
            </div>
            
            <!-- Pagination controls -->
            <div class="pagination" id="pagination">
                <button class="page-btn" id="prevPage" disabled>← Previous</button>
                <span class="page-info" id="pageInfo">Page 1</span>
                <button class="page-btn" id="nextPage" disabled>Next →</button>
                <div class="entries-per-page">
                    <span>Show:</span>
                    <select id="entriesPerPage">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Debug function
            function showDebug(message, type = 'info') {
                const debugEl = document.getElementById('debugInfo');
                debugEl.classList.add('visible');
                debugEl.innerHTML += `[${type}] ${message}<br>`;
                console.log(`[${type}]`, message);
            }

            // Get username from localStorage if it exists, otherwise show "Guest"
            const username = localStorage.getItem('packarcade_username') || 'Guest';
            document.getElementById('usernameDisplay').textContent = username;

            // State management
            let currentGame = 'all';
            let allScores = [];
            let currentPage = 1;
            let entriesPerPage = 25;

            // Games list
            const games = [
                'SpaceShooters', 'Tetris', 'Pacman', 
                'Flappy Bird', 'Cookie Clicker', 'Bitlife', 'Run'
            ];

            // Setup game selector
            const selector = document.getElementById('gameSelector');
            games.forEach(game => {
                const btn = document.createElement('button');
                btn.className = 'game-btn';
                btn.dataset.game = game.toLowerCase().replace(/\s+/g, '');
                btn.textContent = game;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentGame = btn.dataset.game;
                    currentPage = 1;
                    loadLeaderboard();
                });
                selector.appendChild(btn);
            });

            // Setup entries per page selector
            const entriesSelect = document.getElementById('entriesPerPage');
            entriesSelect.addEventListener('change', () => {
                entriesPerPage = parseInt(entriesSelect.value);
                currentPage = 1;
                displayCurrentPage();
            });

            // Pagination controls
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const pageInfo = document.getElementById('pageInfo');

            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    displayCurrentPage();
                }
            });

            nextBtn.addEventListener('click', () => {
                const maxPage = Math.ceil(allScores.length / entriesPerPage);
                if (currentPage < maxPage) {
                    currentPage++;
                    displayCurrentPage();
                }
            });

            // Display current page of scores
            function displayCurrentPage() {
                const rowsContainer = document.getElementById('leaderboardRows');
                
                if (!allScores || allScores.length === 0) {
                    rowsContainer.innerHTML = '<div class="empty-message">No scores yet. Be the first!</div>';
                    prevBtn.disabled = true;
                    nextBtn.disabled = true;
                    pageInfo.textContent = 'Page 1';
                    return;
                }

                const start = (currentPage - 1) * entriesPerPage;
                const end = start + entriesPerPage;
                const pageScores = allScores.slice(start, end);
                const maxPage = Math.ceil(allScores.length / entriesPerPage);

                let html = '';
                pageScores.forEach((entry, index) => {
                    const globalRank = start + index + 1;
                    const playerName = entry.username || 'Unknown';
                    const score = entry.score || 0;
                    const date = entry.created_at ? new Date(entry.created_at).toLocaleDateString() : 'N/A';

                    const rowClass = `table-row ${playerName === username ? 'current-user' : ''}`;
                    let rankClass = '';
                    if (globalRank === 1) rankClass = 'rank-1';
                    else if (globalRank === 2) rankClass = 'rank-2';
                    else if (globalRank === 3) rankClass = 'rank-3';

                    html += `
                        <div class="${rowClass}">
                            <div class="${rankClass}">#${globalRank}</div>
                            <div class="player-name">
                                <div class="avatar">${playerName.charAt(0)}</div>
                                ${playerName}
                            </div>
                            <div class="score">${score.toLocaleString()}</div>
                            <div>${date}</div>
                        </div>
                    `;
                });
                rowsContainer.innerHTML = html;

                // Update pagination buttons
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === maxPage;
                pageInfo.textContent = `Page ${currentPage} of ${maxPage}`;
            }

            // Load leaderboard data
            async function loadLeaderboard() {
                const rowsContainer = document.getElementById('leaderboardRows');
                rowsContainer.innerHTML = '<div class="loading">Loading leaderboard...</div>';
                
                // Clear debug
                document.getElementById('debugInfo').innerHTML = '';
                document.getElementById('debugInfo').classList.remove('visible');

                try {
                    const url = `/.netlify/functions/get-leaderboard?game=${encodeURIComponent(currentGame)}`;
                    showDebug(`Fetching: ${url}`);
                    
                    const res = await fetch(url);
                    showDebug(`Response status: ${res.status} ${res.statusText}`);
                    
                    // Check content type
                    const contentType = res.headers.get('content-type');
                    showDebug(`Content-Type: ${contentType}`);
                    
                    if (!res.ok) {
                        throw new Error(`HTTP error ${res.status}`);
                    }

                    // Try to get the response text first
                    const text = await res.text();
                    showDebug(`First 100 chars of response: ${text.substring(0, 100)}`);
                    
                    // Try to parse as JSON
                    let data;
                    try {
                        data = JSON.parse(text);
                    } catch (e) {
                        showDebug(`Failed to parse JSON: ${e.message}`, 'error');
                        throw new Error(`Invalid JSON response. Got HTML instead of JSON - your Netlify function might not be deployed correctly.`);
                    }

                    // Validate data
                    if (!data.scores) {
                        showDebug(`Response missing 'scores' property`, 'error');
                        throw new Error('Invalid response format: missing scores');
                    }

                    if (!Array.isArray(data.scores)) {
                        showDebug(`'scores' is not an array`, 'error');
                        throw new Error('Invalid response format: scores is not an array');
                    }

                    showDebug(`Success! Loaded ${data.scores.length} scores`);
                    allScores = data.scores;
                    currentPage = 1;
                    displayCurrentPage();

                } catch (error) {
                    console.error('Leaderboard error:', error);
                    rowsContainer.innerHTML = `<div class="error-message">Failed to load leaderboard: ${error.message}</div>`;
                    prevBtn.disabled = true;
                    nextBtn.disabled = true;
                    pageInfo.textContent = 'Page 1';
                }
            }

            // Initial load
            loadLeaderboard();
        })();
    </script>
</body>
</html>
