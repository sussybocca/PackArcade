<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore // PackArcade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .nav-links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            border: 2px solid white;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: white;
            color: #764ba2;
        }

        .search-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 1px solid #ddd;
            background: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .site-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .site-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .site-preview {
            height: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
        }

        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ffd700;
            color: #000;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .site-content {
            padding: 20px;
        }

        .site-title {
            font-size: 20px;
            margin-bottom: 5px;
            color: #333;
        }

        .site-url {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            display: block;
            margin-bottom: 10px;
        }

        .site-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .site-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 13px;
            color: #999;
        }

        .rating {
            color: #ffd700;
        }

        .rating i {
            margin-right: 2px;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .tag {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
            color: #666;
        }

        .visit-btn {
            display: block;
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            padding: 8px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-compass"></i> Explore PackArcade</h1>
            <p>Discover amazing sites created by our community</p>
            <div class="nav-links">
                <a href="/dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> DASHBOARD</a>
                <a href="/editor.html" class="nav-link"><i class="fas fa-code"></i> EDITOR</a>
            </div>
        </div>

        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="Search sites..." onkeyup="if(event.key === 'Enter') searchSites()">
                <button class="search-btn" onclick="searchSites()"><i class="fas fa-search"></i> Search</button>
            </div>
            <div class="filters" id="filters">
                <button class="filter-btn active" onclick="filterCategory('all')">All</button>
                <button class="filter-btn" onclick="filterCategory('games')">Games</button>
                <button class="filter-btn" onclick="filterCategory('apps')">Apps</button>
                <button class="filter-btn" onclick="filterCategory('portfolios')">Portfolios</button>
                <button class="filter-btn" onclick="filterCategory('blogs')">Blogs</button>
                <button class="filter-btn" onclick="filterCategory('tools')">Tools</button>
            </div>
        </div>

        <div id="sitesGrid" class="sites-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 60px;">
                <span class="loading"></span>
                <p style="margin-top: 20px;">Loading amazing sites...</p>
            </div>
        </div>

        <div class="pagination" id="pagination">
            <!-- Pagination will appear here -->
        </div>
    </div>

    <script>
        let currentPage = 1;
        let currentCategory = 'all';
        let currentSearch = '';

        async function loadExploreSites() {
            const grid = document.getElementById('sitesGrid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px;"><span class="loading"></span><p style="margin-top: 20px;">Loading amazing sites...</p></div>';
            
            try {
                let url = `/.netlify/functions/explore-sites?page=${currentPage}`;
                if (currentCategory !== 'all') url += `&category=${currentCategory}`;
                if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;
                
                const res = await fetch(url);
                const data = await res.json();
                
                renderSites(data.sites);
                renderPagination(data.page, data.total);
            } catch (err) {
                console.error('Error loading explore sites:', err);
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #666;">Failed to load sites</div>';
            }
        }

        function renderSites(sites) {
            const grid = document.getElementById('sitesGrid');
            
            if (!sites || sites.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #666;">No sites found</div>';
                return;
            }

            let html = '';
            sites.forEach(site => {
                const subdomain = site.subdomains?.subdomain_name || 'unknown';
                const url = `https://${subdomain}.packarcade.xyz/.netlify/functions/serve-user-site.js`;
                const rating = site.avgRating || 0;
                const fullStars = Math.floor(rating);
                const hasHalfStar = rating % 1 >= 0.5;
                
                html += `
                    <div class="site-card">
                        <div class="site-preview">
                            ${site.featured ? '<span class="featured-badge"><i class="fas fa-star"></i> Featured</span>' : ''}
                        </div>
                        <div class="site-content">
                            <h3 class="site-title">${site.subdomains?.config?.name || subdomain}</h3>
                            <a href="${url}" class="site-url" target="_blank">${url}</a>
                            <p class="site-description">${site.description || 'No description provided'}</p>
                            <div class="site-meta">
                                <span><i class="fas fa-eye"></i> ${site.total_visits || 0} visits</span>
                                <span class="rating">
                                    ${Array(fullStars).fill('<i class="fas fa-star"></i>').join('')}
                                    ${hasHalfStar ? '<i class="fas fa-star-half-alt"></i>' : ''}
                                    ${Array(5 - fullStars - (hasHalfStar ? 1 : 0)).fill('<i class="far fa-star"></i>').join('')}
                                    (${site.reviewCount || 0})
                                </span>
                            </div>
                            <div class="tags">
                                ${site.tags?.map(tag => `<span class="tag">${tag}</span>`).join('') || ''}
                                ${site.category ? `<span class="tag">${site.category}</span>` : ''}
                            </div>
                            <a href="${url}" class="visit-btn" target="_blank"><i class="fas fa-external-link-alt"></i> Visit Site</a>
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        function renderPagination(page, total) {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(total / 20);
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
                    html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === page - 3 || i === page + 3) {
                    html += `<span class="page-btn" style="border: none;">...</span>`;
                }
            }
            
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            loadExploreSites();
        }

        function filterCategory(category) {
            currentCategory = category;
            currentPage = 1;
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            loadExploreSites();
        }

        function searchSites() {
            currentSearch = document.getElementById('searchInput').value;
            currentPage = 1;
            loadExploreSites();
        }

        // Initial load
        loadExploreSites();
    </script>
</body>
</html>
