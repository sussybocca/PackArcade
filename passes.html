<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASS WALL // PACKARCADE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            color: #0f0;
            padding: 0;
            position: relative;
            overflow: hidden;
            height: 100vh;
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0.15;
            z-index: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03) 0px,
                rgba(0, 0, 0, 0.5) 1px,
                transparent 2px
            );
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(100%); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 100%;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            border: 2px solid #0f0;
            padding: 15px 20px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #0f0;
            animation: flicker 3s infinite;
        }

        .title span {
            color: #000;
            background: #0f0;
            padding: 5px 10px;
            margin-right: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            color: #0f0;
            opacity: 0.7;
            font-size: 11px;
        }

        .stat-value {
            font-size: 20px;
            text-shadow: 0 0 5px #0f0;
        }

        .subdomain-input {
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #0f0;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .subdomain-input label {
            color: #0f0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #0f0;
        }

        .subdomain-input input {
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            padding: 12px 20px;
            flex: 1;
            min-width: 250px;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .subdomain-input input:focus {
            outline: none;
            box-shadow: 0 0 15px #0f0;
        }

        .subdomain-input button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 16px;
        }

        .subdomain-input button:hover {
            background: #00ff00;
            box-shadow: 0 0 25px #0f0;
            transform: scale(1.02);
        }

        .pass-wall {
            border: 2px solid #0f0;
            background: rgba(0, 10, 0, 0.95);
            padding: 0;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.3);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .wall-header {
            border-bottom: 2px solid #0f0;
            padding: 15px 20px;
            background: rgba(0, 20, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .wall-title {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 8px #0f0;
        }

        .wall-controls {
            display: flex;
            gap: 15px;
        }

        .wall-btn {
            background: none;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            transition: all 0.3s;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .wall-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 15px #0f0;
        }

        .pass-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
            height: 100%;
            background: #000;
            position: relative;
        }

        .pass-grid::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px,
                transparent 20%,
                rgba(0, 255, 0, 0.02) 20%,
                rgba(0, 255, 0, 0.02) 20.1%
            );
            pointer-events: none;
            z-index: 1;
        }

        .pass-item {
            background: rgba(0, 30, 0, 0.6);
            border: 1px solid #0f0;
            padding: 12px 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            word-break: break-all;
            position: relative;
            font-family: 'Share Tech Mono', monospace;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.2);
            animation: glitch 5s infinite;
        }

        @keyframes glitch {
            0% { opacity: 1; }
            95% { opacity: 1; }
            96% { opacity: 0.8; }
            97% { opacity: 1; }
            98% { opacity: 0.9; }
            99% { opacity: 1; }
        }

        .pass-item:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 15px #0f0, inset 0 0 10px #0f0;
            transform: scale(1.02);
            z-index: 10;
            border-width: 2px;
        }

        .pass-item.used {
            opacity: 0.3;
            border-color: #666;
            color: #666;
            text-decoration: line-through;
            filter: blur(1px);
            text-shadow: none;
            animation: none;
            position: relative;
        }

        .pass-item.used::after {
            content: '[EXPIRED]';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            color: #f00;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 0 0 5px #f00;
            opacity: 0.9;
            white-space: nowrap;
        }

        .pass-item.copied {
            background: #0f0;
            color: #000;
            animation: flash 0.5s;
        }

        @keyframes flash {
            0% { background: #0f0; }
            50% { background: #fff; }
            100% { background: #0f0; }
        }

        .selected-pass {
            border-top: 2px solid #0f0;
            padding: 20px;
            background: rgba(0, 10, 0, 0.95);
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .selected-pass-label {
            color: #0f0;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 3px;
            text-shadow: 0 0 5px #0f0;
        }

        .selected-pass-value {
            background: #000;
            border: 2px solid #0f0;
            padding: 12px 20px;
            flex: 1;
            font-family: 'Share Tech Mono', monospace;
            color: #0f0;
            word-break: break-all;
            font-size: 16px;
            letter-spacing: 2px;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .action-btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 16px;
        }

        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: #666;
            box-shadow: none;
        }

        .action-btn:not(:disabled):hover {
            box-shadow: 0 0 25px #0f0;
            transform: scale(1.05);
        }

        .copy-btn {
            background: none;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 12px 25px;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .copy-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 15px #0f0;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #0f0;
            display: none;
            text-align: center;
            font-size: 16px;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.8);
        }

        .status-message.active {
            display: block;
        }

        .status-message.success {
            background: rgba(0, 255, 0, 0.1);
            border-color: #0f0;
            color: #0f0;
            box-shadow: 0 0 20px #0f0;
        }

        .status-message.error {
            background: rgba(255, 0, 0, 0.1);
            border-color: #f00;
            color: #f00;
            box-shadow: 0 0 20px #f00;
        }

        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #0f0;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hack-cursor {
            display: inline-block;
            width: 15px;
            height: 20px;
            background: #0f0;
            animation: blink 1s infinite;
            margin-left: 5px;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .copy-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #0f0;
            color: #000;
            padding: 10px 20px;
            border: 2px solid #fff;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            z-index: 9999;
            display: none;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .pass-grid::-webkit-scrollbar {
            width: 12px;
        }

        .pass-grid::-webkit-scrollbar-track {
            background: #000;
            border-left: 2px solid #0f0;
        }

        .pass-grid::-webkit-scrollbar-thumb {
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
            border-radius: 0;
        }

        .pass-grid::-webkit-scrollbar-thumb:hover {
            background: #00ff00;
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    
    <div class="copy-notification" id="copyNotification">✓ PASS COPIED TO CLIPBOARD</div>

    <div class="container">
        <div class="header">
            <div class="title">
                <span>#</span> PASS WALL v2.0
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">PASSES</div>
                    <div class="stat-value" id="passCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">SESSION</div>
                    <div class="stat-value" id="sessionId">----</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">STATUS</div>
                    <div class="stat-value" id="status">LIVE</div>
                </div>
            </div>
        </div>

        <div class="subdomain-input">
            <label>> TARGET_SUBDOMAIN:</label>
            <input type="text" id="subdomainInput" placeholder="enter subdomain to hack" value="">
            <button onclick="generatePasses()">⟳ GENERATE 100 PASSES</button>
        </div>

        <div class="pass-wall">
            <div class="wall-header">
                <div class="wall-title">> ACTIVE PASSES [<span id="activeCount">0</span>]</div>
                <div class="wall-controls">
                    <button class="wall-btn" onclick="copyAllPasses()">📋 COPY ALL</button>
                    <button class="wall-btn" onclick="refreshPasses()">🔄 REFRESH</button>
                </div>
            </div>
            
            <div class="pass-grid" id="passGrid">
                <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #666;">
                    Enter a subdomain and click GENERATE to create passes
                </div>
            </div>

            <div class="selected-pass">
                <span class="selected-pass-label">> SELECTED_PASS:</span>
                <span class="selected-pass-value" id="selectedPassDisplay">—</span>
                <button class="copy-btn" id="copySelectedBtn" onclick="copySelectedPass()" disabled>📋 COPY</button>
                <button class="action-btn" id="validateBtn" onclick="validatePass()" disabled>⚡ VALIDATE</button>
            </div>
        </div>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        // Session management
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'session_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36);
            localStorage.setItem('sessionId', sessionId);
        }
        document.getElementById('sessionId').textContent = sessionId.substr(0, 8) + '...';

        let activePasses = [];
        let selectedPass = null;
        let selectedIndex = -1;
        let currentSubdomain = '';

        // Load subdomain from URL if present
        const urlParams = new URLSearchParams(window.location.search);
        const urlSubdomain = urlParams.get('subdomain');
        if (urlSubdomain) {
            document.getElementById('subdomainInput').value = urlSubdomain;
            currentSubdomain = urlSubdomain;
            loadExistingPasses();
        }

        async function generatePasses() {
            const subdomain = document.getElementById('subdomainInput').value.trim();
            if (!subdomain) {
                showStatus('> ERROR: NO TARGET SPECIFIED', 'error');
                return;
            }

            currentSubdomain = subdomain;
            showStatus('> GENERATING 100 PASSES...', 'success');
            
            const grid = document.getElementById('passGrid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px;"><span class="loading"></span><br><br>GENERATING PASSES...</div>';
            
            try {
                // Generate 100 passes by calling the function 100 times
                const passes = [];
                
                for (let i = 0; i < 100; i++) {
                    const res = await fetch('/.netlify/functions/generate-pass', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            subdomain: subdomain,
                            sessionId: sessionId
                        })
                    });
                    
                    const data = await res.json();
                    if (data.success) {
                        passes.push({
                            pass: data.pass,
                            used: false,
                            expires: new Date(data.expires).toLocaleString()
                        });
                    }
                    
                    // Update progress every 10 passes
                    if (i % 10 === 0) {
                        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 60px;"><span class="loading"></span><br><br>GENERATING PASSES... ${i+1}/100</div>`;
                    }
                }
                
                activePasses = passes;
                renderPassGrid(passes);
                showStatus(`> SUCCESS: 100 PASSES GENERATED FOR ${subdomain}`, 'success');
                
            } catch (err) {
                showStatus('> ERROR: ' + err.message, 'error');
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #f00;">FAILED TO GENERATE PASSES</div>';
            }
        }

        async function loadExistingPasses() {
            // This would need a get-passes function to load existing unused passes
            // For now, just prompt to generate new ones
            showStatus('> NO PASSES FOUND. CLICK GENERATE TO CREATE 100 NEW PASSES.', 'error');
        }

        function renderPassGrid(passes) {
            const grid = document.getElementById('passGrid');
            let html = '';
            
            passes.forEach((pass, index) => {
                const usedClass = pass.used ? 'used' : '';
                html += `
                    <div class="pass-item ${usedClass}" 
                         onclick="selectPass('${pass.pass.replace(/'/g, "\\'")}', ${index})"
                         ondblclick="copyPass('${pass.pass.replace(/'/g, "\\'")}')"
                         title="Click to select | Double-click to copy | Expires: ${pass.expires}">
                        ${pass.pass}
                    </div>
                `;
            });
            
            grid.innerHTML = html;
            document.getElementById('passCount').textContent = passes.length;
            document.getElementById('activeCount').textContent = passes.filter(p => !p.used).length;
        }

        function selectPass(pass, index) {
            if (activePasses[index] && activePasses[index].used) {
                showStatus('> PASS ALREADY USED', 'error');
                return;
            }
            
            selectedPass = pass;
            selectedIndex = index;
            document.getElementById('selectedPassDisplay').textContent = pass;
            document.getElementById('validateBtn').disabled = false;
            document.getElementById('copySelectedBtn').disabled = false;
            showStatus(`> PASS SELECTED: ${pass.substr(0, 20)}...`, 'success');
        }

        async function copyPass(pass) {
            try {
                await navigator.clipboard.writeText(pass);
                
                // Visual feedback
                const notification = document.getElementById('copyNotification');
                notification.style.display = 'block';
                setTimeout(() => {
                    notification.style.display = 'none';
                }, 2000);
                
                showStatus('> PASS COPIED TO CLIPBOARD', 'success');
            } catch (err) {
                showStatus('> COPY FAILED: ' + err.message, 'error');
            }
        }

        function copySelectedPass() {
            if (selectedPass) {
                copyPass(selectedPass);
            }
        }

        function copyAllPasses() {
            const allPasses = activePasses.map(p => p.pass).join('\n');
            copyPass(allPasses);
            showStatus('> ALL 100 PASSES COPIED', 'success');
        }

        async function validatePass() {
            if (!selectedPass || !currentSubdomain) {
                showStatus('> NO PASS SELECTED', 'error');
                return;
            }

            if (activePasses[selectedIndex] && activePasses[selectedIndex].used) {
                showStatus('> CANNOT USE EXPIRED PASS', 'error');
                return;
            }

            showStatus('> VALIDATING PASS...', 'success');
            document.getElementById('validateBtn').disabled = true;

            try {
                const res = await fetch('/.netlify/functions/validate-pass', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pass: selectedPass,
                        subdomain: currentSubdomain,
                        sessionId: sessionId
                    })
                });

                const data = await res.json();

                if (data.success) {
                    showStatus('> PASS VALIDATED! ACCESS GRANTED', 'success');
                    
                    // Mark as used in UI
                    if (selectedIndex !== -1) {
                        activePasses[selectedIndex].used = true;
                        renderPassGrid(activePasses);
                    }
                    
                    // Store edit token
                    localStorage.setItem('editToken_' + currentSubdomain, data.token);
                    
                    // Redirect to editor with token
                    setTimeout(() => {
                        window.location.href = `/editor.html?subdomain=${encodeURIComponent(currentSubdomain)}&token=${data.token}`;
                    }, 2000);
                } else {
                    showStatus('> INVALID PASS: ' + (data.error || 'ACCESS DENIED'), 'error');
                    document.getElementById('validateBtn').disabled = false;
                }
            } catch (err) {
                showStatus('> ERROR: ' + err.message, 'error');
                document.getElementById('validateBtn').disabled = false;
            }
        }

        function refreshPasses() {
            if (currentSubdomain) {
                generatePasses();
            } else {
                showStatus('> ENTER A SUBDOMAIN FIRST', 'error');
            }
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message active ' + type;
            
            if (type === 'success') {
                document.getElementById('status').textContent = 'ACTIVE';
            } else {
                document.getElementById('status').textContent = 'ERROR';
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                refreshPasses();
            }
            if (e.ctrlKey && e.key === 'c' && selectedPass) {
                e.preventDefault();
                copySelectedPass();
            }
            if (e.ctrlKey && e.key === 'Enter' && selectedPass) {
                e.preventDefault();
                validatePass();
            }
        });
    </script>
</body>
</html>
