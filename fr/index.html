<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackArcade – Français</title>
    <style>
        @font-face {
            font-family: 'ArcadeFont';
            src: url('/fonts/ArcadeFont.woff2') format('woff2'),
                 url('/fonts/ArcadeFont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'ArcadeFont', monospace;
            background: #0a0c0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 20%, #1e1e4a 0%, #0a0c0f 90%);
        }
        .container {
            max-width: 800px;
            background: rgba(30, 30, 46, 0.9);
            backdrop-filter: blur(10px);
            border: 3px solid #a8d8ff;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 0 50px #4a4e69aa;
            text-align: center;
        }
        h1 {
            font-size: 3.5rem;
            color: #a8d8ff;
            text-shadow: 0 0 10px #00aaff;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5rem;
            margin: 30px 0;
            color: #d0d0ff;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #a8d8ff;
            text-decoration: none;
            font-size: 1.4rem;
            border: 2px solid #a8d8ff;
            padding: 10px 25px;
            border-radius: 40px;
            transition: all 0.3s;
            background: rgba(0,0,0,0.3);
        }
        .nav-links a:hover {
            background: #a8d8ff;
            color: #1e1e2e;
            box-shadow: 0 0 20px #a8d8ff;
        }
        .footer { margin-top: 50px; color: #6c6f85; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PACKARCADE</h1>
        <p>Bienvenue sur PackArcade – votre source de jeux personnalisés, de classiques rétro et du célèbre Pack-Studio.</p>
        <div class="nav-links">
            <a href="/en/">English</a>
            <a href="/es/">Español</a>
            <a href="/repo.html">📦 Repo</a>
        </div>
        <div class="footer">
            <span>⚗️ propulsé par Pack-Studio</span>
        </div>
    </div>
</body>
</html>
