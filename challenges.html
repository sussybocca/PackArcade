<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackArcade · Challenges</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Same styles as leaderboard but with challenge card styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0e17, #1a1f2f);
            color: #eef2ff;
            min-height: 100vh;
        }
        .nav-bar {
            background: rgba(15,20,35,0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a678ff, #7a5be8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: #b1b9d9;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: white;
        }
        .username {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid rgba(162,142,255,0.3);
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fff, #cbd0ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .challenge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .challenge-card {
            background: rgba(20,25,45,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .challenge-card.daily::before {
            content: 'DAILY';
            position: absolute;
            top: 20px;
            right: -30px;
            background: #ffaa33;
            color: #1a142b;
            padding: 0.2rem 3rem;
            transform: rotate(45deg);
            font-weight: bold;
            font-size: 0.8rem;
        }
        .challenge-card.weekly::before {
            content: 'WEEKLY';
            position: absolute;
            top: 20px;
            right: -30px;
            background: #7a5be8;
            color: white;
            padding: 0.2rem 3rem;
            transform: rotate(45deg);
            font-weight: bold;
            font-size: 0.8rem;
        }
        .challenge-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .challenge-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .challenge-game {
            color: #a678ff;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        .challenge-desc {
            color: #b1b9d9;
            margin-bottom: 1.5rem;
        }
        .challenge-goal {
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 1rem 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7a5be8, #a678ff);
            width: 0%;
            transition: width 0.3s;
        }
        .reward {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            border: 1px solid gold;
            color: gold;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
        .claim-btn {
            background: #4a40bf;
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: 0.2s;
        }
        .claim-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .claim-btn:hover:not(:disabled) {
            background: #5e50dc;
        }
        .completed-badge {
            color: #4caf50;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="logo">🎮 PackArcade</div>
        <div class="nav-links">
            <a href="/"><i class="fas fa-home"></i> Games</a>
            <a href="/leaderboard.html"><i class="fas fa-chart-line"></i> Leaderboard</a>
            <a href="/challenges.html" class="active"><i class="fas fa-trophy"></i> Challenges</a>
            <a href="/profile.html"><i class="fas fa-user"></i> Profile</a>
        </div>
        <div class="username" id="usernameDisplay">Loading...</div>
    </div>

    <div class="container">
        <h1><i class="fas fa-trophy"></i> Daily & Weekly Challenges</h1>
        <div id="challengesContainer" class="challenge-grid"></div>
    </div>

    <script>
        const username = localStorage.getItem('packarcade_username');
        if (!username) {
            window.location.href = '/';
        }
        document.getElementById('usernameDisplay').textContent = username;

        async function loadChallenges() {
            const res = await fetch('/.netlify/functions/get-challenges');
            const { challenges } = await res.json();
            
            const container = document.getElementById('challengesContainer');
            container.innerHTML = '';
            
            challenges.forEach(challenge => {
                const isDaily = challenge.end_date === new Date().toISOString().split('T')[0];
                const card = document.createElement('div');
                card.className = `challenge-card ${isDaily ? 'daily' : 'weekly'}`;
                
                // Get user progress from localStorage
                const progress = JSON.parse(localStorage.getItem(`challenge_${challenge.id}`)) || { score: 0, claimed: false };
                const percent = Math.min(100, (progress.score / challenge.goal_score) * 100);
                
                card.innerHTML = `
                    <div class="challenge-icon">🏆</div>
                    <div class="challenge-title">${challenge.title}</div>
                    <div class="challenge-game">${challenge.game_slug}</div>
                    <div class="challenge-desc">${challenge.description}</div>
                    <div class="challenge-goal">
                        <span>Goal: ${challenge.goal_score.toLocaleString()}</span>
                        <span>Your: ${progress.score}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percent}%"></div>
                    </div>
                    <div class="reward">⭐ ${challenge.reward_xp} XP</div>
                `;
                
                container.appendChild(card);
            });
        }

        loadChallenges();
    </script>
</body>
</html>
