<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – PackArcade EN</title>
    <style>
        @font-face {
            font-family: 'ArcadeFont';
            src: url('/fonts/ArcadeFont.woff2') format('woff2'),
                 url('/fonts/ArcadeFont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'ArcadeFont', monospace;
            background: #0a0c0f;
            color: #fff;
            overflow: hidden;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background: rgba(10, 12, 15, 0.85);
            backdrop-filter: blur(5px);
            padding: 2rem;
            border-left: 4px solid #ff00c1;
            border-right: 4px solid #00ffea;
            box-shadow: 0 0 40px #ff00c1aa;
            margin: 0 10%;
            border-radius: 20px;
        }
        h1 {
            font-size: 8rem;
            margin: 0;
            text-shadow: 0 0 20px #ff00c1, 0 0 40px #00ffea;
            animation: glitch 1s infinite;
            line-height: 1;
        }
        @keyframes glitch {
            0%,100%{ transform:skew(0deg,0deg); opacity:1; }
            95%{ transform:skew(5deg,-2deg); opacity:0.8; text-shadow:-5px 0 cyan,5px 0 magenta; }
            96%{ transform:skew(-5deg,2deg); opacity:0.9; text-shadow:5px 0 cyan,-5px 0 magenta; }
            97%{ transform:skew(3deg,-1deg); }
        }
        p {
            font-size: 1.8rem;
            max-width: 700px;
            margin: 30px 0;
            color: #a8d8ff;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 12px;
            border:1px solid #a8d8ff;
        }
        a {
            display: inline-block;
            padding: 15px 40px;
            border: 3px solid #a8d8ff;
            color: #a8d8ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.4rem;
            border-radius: 50px;
            transition: 0.3s;
            background: rgba(0,0,0,0.3);
        }
        a:hover {
            background: #a8d8ff;
            color: #0a0c0f;
            box-shadow: 0 0 30px #a8d8ff;
        }
        @media (max-width:600px){
            h1{font-size:5rem;}
            p{font-size:1.3rem;}
            .content{margin:0 5%;}
        }
    </style>
</head>
<body>
    <canvas id="glitchCanvas"></canvas>
    <div class="content">
        <h1>404</h1>
        <p>You've wandered into a forgotten level. This page does not exist in this dimension.</p>
        <a href="/en/">↳ Return to Arcade</a>
    </div>
    <script>
        (function(){
            const canvas = document.getElementById('glitchCanvas');
            const ctx = canvas.getContext('2d');
            let w,h;
            function resize(){ w=window.innerWidth; h=window.innerHeight; canvas.width=w; canvas.height=h; }
            window.addEventListener('resize', resize); resize();

            const particles = [];
            for(let i=0;i<120;i++){
                particles.push({
                    x:Math.random()*w, y:Math.random()*h,
                    vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2,
                    size:Math.random()*3+1,
                    color:`hsl(${Math.random()*360},100%,70%)`
                });
            }
            function draw(){
                ctx.fillStyle='rgba(10,12,15,0.1)';
                ctx.fillRect(0,0,w,h);
                particles.forEach(p=>{
                    ctx.beginPath();
                    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
                    ctx.fillStyle=p.color;
                    ctx.fill();
                    p.x+=p.vx; p.y+=p.vy;
                    if(p.x<0||p.x>w)p.vx*=-1;
                    if(p.y<0||p.y>h)p.vy*=-1;
                });
                if(Math.random()<0.05){
                    ctx.fillStyle='rgba(255,0,255,0.3)';
                    ctx.fillRect(0,Math.random()*h,w,Math.random()*20);
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>
</html>
