    /* ========== STYLES (unchanged) ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: #eef2ff;
      line-height: 1.5;
      position: relative;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 10% 20%, rgba(45, 40, 75, 0.8), #0b0e17 80%);
    }

    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      pointer-events: none;
      opacity: 0.7;
    }

    body::before {
      content: '';
      position: fixed;
      width: 70vmax;
      height: 70vmax;
      top: 10vh;
      right: -10vw;
      background: radial-gradient(circle, rgba(100, 80, 220, 0.2) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      filter: blur(80px);
    }

    body::after {
      content: '';
      position: fixed;
      width: 60vmin;
      height: 60vmin;
      bottom: 0;
      left: 0;
      background: radial-gradient(circle, rgba(180, 130, 255, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      filter: blur(70px);
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 0.5rem 0.8rem 0.8rem 0.8rem;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* ----- ULTRA ADVANCED AUDIO MIXER PANEL ----- */
    .mixer-panel {
      background: rgba(15, 20, 35, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      overflow-y: auto;
      max-height: 600px;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
    }

    .mixer-channel {
      min-width: 200px;
      background: rgba(0,0,0,0.3);
      border-radius: 30px;
      padding: 1rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(4px);
    }

    .channel-header {
      text-align: center;
      font-weight: 600;
      color: #b1b9d9;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.8rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .control-label {
      font-size: 0.7rem;
      color: #929cce;
      width: 45px;
    }

    input[type=range] {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      -webkit-appearance: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #a678ff;
      cursor: pointer;
      box-shadow: 0 0 8px #a678ff;
    }

    .eq-row {
      display: flex;
      gap: 0.3rem;
      justify-content: space-between;
    }

    .eq-band {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.6rem;
      color: #b1b9d9;
    }

    .button-group {
      display: flex;
      gap: 0.3rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .mixer-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 0.3rem 0.6rem;
      font-size: 0.65rem;
      color: #b1b9d9;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 45px;
    }

    .mixer-btn:hover {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .mixer-btn.active {
      background: #4a40bf;
      color: white;
    }

    .master-channel {
      min-width: 220px;
      background: linear-gradient(145deg, #2f2a60, #282350);
      border: 1px solid #a28eff;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      justify-content: center;
      background: rgba(15, 20, 35, 0.6);
      backdrop-filter: blur(16px);
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      flex-shrink: 0;
    }

    .filter-btn {
      background: transparent;
      border: none;
      color: #b1b9d9;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    .filter-btn.active {
      background: linear-gradient(145deg, #4a40bf, #7a5be8);
      color: white;
      box-shadow: 0 8px 18px -6px #4a40bf80;
      font-weight: 600;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      perspective: 1200px;
      flex: 1;
      align-content: start;
    }

    .card {
      background: rgba(20, 25, 45, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 1.5rem 1.2rem 1.5rem 1.2rem;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
      display: flex;
      flex-direction: column;
      transform-style: preserve-3d;
      cursor: pointer;
      color: #eef2ff;
      position: relative;
      overflow: hidden;
      height: fit-content;
    }

    .card:hover {
      transform: translateY(-6px) rotateX(2deg) rotateY(1deg);
      background: rgba(30, 35, 60, 0.8);
      border-color: rgba(140, 120, 255, 0.3);
      box-shadow: 0 30px 60px -15px #000000cc, 0 0 0 2px rgba(140, 120, 255, 0.2) inset;
    }

    .card.highlight {
      background: linear-gradient(145deg, #2f2a60, #282350);
      border: 1px solid #a28eff55;
      box-shadow: 0 25px 45px -12px #6240ff, 0 0 0 1px #b5a0ff inset;
    }

    .card.highlight::after {
      content: '★ FEATURED';
      position: absolute;
      top: 10px;
      right: 12px;
      background: #ffd966cc;
      backdrop-filter: blur(4px);
      color: #1a142b;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      letter-spacing: 0.5px;
    }

    .card-icon {
      font-size: 2.8rem;
      line-height: 1;
      margin-bottom: 0.8rem;
      filter: drop-shadow(0 8px 12px #00000050);
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #fff, #d2c9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.9rem;
      color: #b9c2e8;
      margin-bottom: 1.2rem;
      line-height: 1.5;
      flex: 1;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }

    .feature-tag {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 40px;
      padding: 0.2rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: #cbd0ec;
      backdrop-filter: blur(2px);
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 0.5rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #ffffffdd;
      text-decoration: none;
      transition: all 0.2s;
      margin-top: auto;
      align-self: flex-start;
      backdrop-filter: blur(4px);
    }

    .card-link:hover {
      background: #5e50dc;
      border-color: #a88eff;
      box-shadow: 0 6px 14px #3f2db0;
      gap: 0.8rem;
    }

    .card-link span {
      font-size: 1rem;
    }

    .category-badge {
      position: absolute;
      bottom: 15px;
      right: 16px;
      font-size: 0.65rem;
      text-transform: uppercase;
      background: rgba(255,255,255,0.02);
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      color: #929cce;
      border: 1px solid rgba(255,255,255,0.05);
      letter-spacing: 0.3px;
    }

    .empty-message {
      text-align: center;
      padding: 3rem 1.5rem;
      background: rgba(0,0,0,0.2);
      border-radius: 48px;
      backdrop-filter: blur(8px);
      border: 1px dashed #536;
      font-size: 1.1rem;
      color: #a8b2e0;
    }

    /* Game Player Modal */
    .game-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .game-modal.active {
      display: flex;
    }
    .game-canvas-container {
      background: #111;
      border-radius: 24px;
      padding: 10px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      border: 1px solid #a28eff;
    }
    canvas#gameCanvas {
      display: block;
      width: 800px;
      height: 600px;
      border-radius: 16px;
      background: #000;
    }
    .game-controls {
      margin-top: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .game-controls button {
      background: #5e50dc;
      border: none;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .game-controls button:hover {
      background: #7a6af0;
    }
    .game-errors {
      color: #ff7b7b;
      max-width: 800px;
      text-align: center;
      margin-top: 10px;
      font-family: monospace;
    }

    /* Independent control sections */
    .music-controls, .funny-controls, .human-controls, .fx-controls {
      position: fixed;
      z-index: 100;
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }
    .music-controls { bottom: 20px; left: 20px; }
    .funny-controls { bottom: 100px; left: 20px; }
    .human-controls { bottom: 180px; left: 20px; }
    .fx-controls { bottom: 20px; right: 20px; }

    #music-toggle, #funny-toggle, #human-toggle, #fx-toggle {
      background: rgba(20, 25, 45, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 0.7rem 1.2rem;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 10px 25px -8px rgba(0,0,0,0.6);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      line-height: 1;
    }
    #music-toggle:hover, #funny-toggle:hover, #human-toggle:hover, #fx-toggle:hover {
      background: rgba(50, 55, 80, 0.9);
      border-color: rgba(180, 130, 255, 0.5);
      transform: scale(1.05);
    }
    #song-select, #fx-select, #human-select, #funny-select {
      background: rgba(20, 25, 45, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 0.7rem 1.2rem;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 10px 25px -8px rgba(0,0,0,0.6);
      transition: all 0.2s;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #song-select option, #fx-select option, #human-select option, #funny-select option {
      background: #1a1f33;
      color: white;
    }

    @media (max-width: 600px) {
      .container { padding: 0.3rem; }
      .filter-bar { padding: 0.6rem 1rem; }
      .cards-grid { gap: 0.8rem; }
      .music-controls, .funny-controls, .human-controls, .fx-controls {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
      .music-controls { bottom: 20px; }
      .funny-controls { bottom: 120px; }
      .human-controls { bottom: 220px; }
      #song-select, #fx-select, #human-select, #funny-select { max-width: 150px; }
      .mixer-panel { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>

    <div class="game-controls">
      <button id="closeGame">Close</button>
      <button id="restartGame">Restart</button>
    </div>
    <div id="gameErrors" class="game-errors"></div>
  </div>

  <div class="human-controls">
    <button id="human-toggle" class="muted" title="Toggle human sound"><span>🔇</span> <span>Human</span></button>
    <select id="human-select" title="Select a human sound"><option value="">Loading...</option></select>
  </div>
  
  <div class="funny-controls">
    <button id="funny-toggle" class="muted" title="Toggle funny sound"><span>🔇</span> <span>Funny</span></button>
    <select id="funny-select" title="Select a funny sound"><option value="">Loading...</option></select>
  </div>
  
  <div class="music-controls">
    <button id="music-toggle" class="muted" title="Toggle lobby music"><span>🔇</span> <span>Music</span></button>
    <select id="song-select" title="Select a song"><option value="">Loading...</option></select>
  </div>
  
  <div class="fx-controls">
    <button id="fx-toggle" class="muted" title="Toggle arcade sound effect"><span>🔇</span> <span>Arcade FX</span></button>
    <select id="fx-select" title="Select an effect"><option value="">Loading...</option></select>
  </div>

  <script>
    // ========== GAME CARDS RENDERING ==========
    (function() {
      const grid = document.getElementById('cardsGrid');
      const filterBar = document.getElementById('filterBar');
      const categories = ['all', ...new Set(cardsData.map(c => c.category).filter(Boolean))];
      filterBar.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === 'all' ? ' active' : '');
        btn.setAttribute('data-category', cat);
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderCards(cat);
        });
        filterBar.appendChild(btn);
      });

      function renderCards(category = 'all') {
        const filtered = category === 'all' ? cardsData : cardsData.filter(c => c.category === category);
        if (filtered.length === 0) {
          grid.innerHTML = `<div class="empty-message">✨ No games in this dimension yet ✨</div>`;
          return;
        }
        let html = '';
        filtered.forEach(card => {
          const highlightClass = card.highlight ? 'highlight' : '';
          const featuresHtml = card.features.map(f => `<span class="feature-tag">${f}</span>`).join('');
          const link = card.link.startsWith('http') ? card.link : card.link;
          const isSimple = card.link.includes('.simple');
          html += `
            <div class="card ${highlightClass}" data-link="${link}" data-issimple="${isSimple}">
              <div class="card-icon">${card.icon || '📁'}</div>
              <h3 class="card-title">${card.title}</h3>
              <p class="card-desc">${card.description}</p>
              <div class="features">${featuresHtml}</div>
              <a href="#" class="card-link" onclick="event.preventDefault();"><span>▶</span> enter</a>
              <span class="category-badge">${card.category || 'demos'}</span>
            </div>
          `;
        });
        grid.innerHTML = html;
        document.querySelectorAll('.card').forEach(card => {
          card.addEventListener('click', (e) => {
            const link = card.dataset.link;
            const isSimple = card.dataset.issimple === 'true';
            if (isSimple) {
              e.preventDefault();
              openSimpleGame(link);
            } else {
              window.location.href = link;
            }
          });
        });
      }
      renderCards('all');
    })();

    // ========== SIMPLE GAMES PLAYER ==========
    const modal = document.getElementById('gameModal');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const closeBtn = document.getElementById('closeGame');
    const restartBtn = document.getElementById('restartGame');
    const errorsDiv = document.getElementById('gameErrors');

    let currentGameCode = '';
    let gameState = {};

    closeBtn.addEventListener('click', () => {
      modal.classList.remove('active');
      if (gameState.animationFrame) {
        cancelAnimationFrame(gameState.animationFrame);
      }
    });

    restartBtn.addEventListener('click', () => {
      if (currentGameCode) {
        runSimpleGame(currentGameCode);
      }
    });

    async function openSimpleGame(link) {
      modal.classList.add('active');
      errorsDiv.textContent = 'Loading...';
      try {
        const response = await fetch(link);
        if (!response.ok) throw new Error('Failed to load game file');
        const code = await response.text();
        currentGameCode = code;
        // Optional validation via secure.js
        const validation = await fetch('/.netlify/functions/secure', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        }).then(res => res.json()).catch(() => null);
        if (validation && !validation.valid) {
          errorsDiv.textContent = '⚠️ Validation errors: ' + (validation.error || 'unknown');
        } else {
          errorsDiv.textContent = '';
        }
        runSimpleGame(code);
      } catch (err) {
        errorsDiv.textContent = 'Error: ' + err.message;
      }
    }

    // ---------- SimpleGames Interpreter (Advanced) ----------
    function runSimpleGame(code) {
      if (gameState.animationFrame) cancelAnimationFrame(gameState.animationFrame);

      // Initialize game state with all new sections
      gameState = {
        vars: {},                 // variables from Var:
        objects: {},              // dynamic objects (Player, Enemy, etc.)
        physics: { gravity: 0.5, friction: 0.1, maxSpeed: 10 },
        events: [],               // OnCollision etc.
        animations: {},
        particles: {},            // ParticleSystem definitions
        behaviors: {},            // Behavior definitions
        camera: { follow: null, shake_on_hit: false, bounds: { x1:0, y1:0, x2:800, y2:600 } },
        debug: false,
        currentLevel: null,
        keys: {},
        score: 0,
        lives: 3,
        gameOver: false,
        win: false,
        frame: 0,
        animationFrame: null
      };

      const lines = code.split('\n');
      let currentSection = null;
      let levelData = null;

      // Helper: parse @...@ into key=value pairs
      function parseAtBlock(inner) {
        const result = {};
        const pairs = inner.split(',').map(s => s.trim()).filter(s => s);
        for (let p of pairs) {
          const eq = p.indexOf('=');
          if (eq > -1) {
            const key = p.substring(0, eq).trim();
            const val = p.substring(eq+1).trim();
            result[key] = val;
          } else {
            // treat as value-only? maybe expression
            result[p] = true;
          }
        }
        return result;
      }

      // Helper: parse $ directives into a map
      function parseDollarBlock(rest) {
        const dirs = {};
        const dollarMatches = rest.match(/\$([A-Za-z0-9_]+)(?:=([^@\s]*))?/g);
        if (dollarMatches) {
          dollarMatches.forEach(d => {
            const eq = d.indexOf('=');
            if (eq > -1) {
              const key = d.substring(1, eq);
              const val = d.substring(eq+1);
              dirs[key] = val;
            } else {
              dirs[d.substring(1)] = true;
            }
          });
        }
        return dirs;
      }

      // Helper: evaluate expression using vars and built-ins
      function evaluateExpr(expr) {
        expr = expr.trim();
        // replace variables with their values
        for (let [k, v] of Object.entries(gameState.vars)) {
          const re = new RegExp('\\b' + k + '\\b', 'g');
          expr = expr.replace(re, v);
        }
        // evaluate simple arithmetic (dangerous but we'll use Function)
        try {
          // allow only numbers, operators, parentheses, and built-in functions
          if (!/^[0-9+\-*/()., sin cos clamp random]+$/.test(expr)) {
            // maybe it's a string? fallback
            return expr;
          }
          // replace sin, cos, clamp, random with Math.*
          expr = expr.replace(/sin/g, 'Math.sin')
                     .replace(/cos/g, 'Math.cos')
                     .replace(/clamp/g, 'Math.clamp') // not standard, handle manually
                     .replace(/random/g, 'Math.random');
          // clamp function: clamp(x,min,max)
          expr = expr.replace(/Math\.clamp\(([^,]+),([^,]+),([^)]+)\)/g, 'Math.min(Math.max($1,$2),$3)');
          return Function('"use strict"; return (' + expr + ')')();
        } catch (e) {
          return expr; // fallback
        }
      }

      // Main parsing loop
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (line.startsWith('//') || line === '') continue;

        // Section headers
        if (line === 'Var:') {
          currentSection = 'var';
          continue;
        }
        if (line === 'Physics:') {
          currentSection = 'physics';
          continue;
        }
        if (line.startsWith('Level_')) {
          currentSection = 'level';
          const levelMatch = line.match(/^Level_(\d+):/i);
          if (levelMatch) {
            levelData = { id: levelMatch[1], width: null, height: null, tiles: [], props: {} };
          }
          continue;
        }
        if (line.startsWith('On')) {
          // Event line: OnCollision: @list@ $actions
          const eventMatch = line.match(/^On([A-Z][a-z]+):\s*@([^@]+)@\s*(.*)$/);
          if (eventMatch) {
            gameState.events.push({
              type: eventMatch[1],
              params: eventMatch[2].split(',').map(s => s.trim()),
              actions: parseDollarBlock(eventMatch[3])
            });
          }
          continue;
        }
        if (line.startsWith('Anim_')) {
          const animMatch = line.match(/^Anim_([A-Za-z0-9_]+):\s*frames:\s*@([^@]+)@\s*(.*)$/);
          if (animMatch) {
            const name = animMatch[1];
            const frames = animMatch[2].split(',').map(f => f.trim());
            const dirs = parseDollarBlock(animMatch[3]);
            gameState.animations[name] = { frames, dirs, currentFrame: 0 };
          }
          continue;
        }
        if (line.startsWith('ParticleSystem')) {
          const psMatch = line.match(/^ParticleSystem\s+([A-Za-z0-9_]+):\s*(.*)$/);
          if (psMatch) {
            const name = psMatch[1];
            const rest = psMatch[2];
            const dirs = parseDollarBlock(rest);
            // Also parse @...@ in same line or next lines
            // For simplicity, store as string; we won't simulate particles fully.
            gameState.particles[name] = { dirs };
          }
          continue;
        }
        if (line.startsWith('Behavior')) {
          const behMatch = line.match(/^Behavior\s+([A-Za-z0-9_]+):/);
          if (behMatch) {
            const name = behMatch[1];
            gameState.behaviors[name] = { states: {}, on_see_player: null };
            currentSection = 'behavior';
          }
          continue;
        }
        if (line === 'Camera:') {
          currentSection = 'camera';
          continue;
        }
        if (line.startsWith('If')) {
          // If Debug_ENAbLE -True:
          const ifMatch = line.match(/^If\s+(.+?)\s*-\s*True:/i);
          if (ifMatch) {
            const condition = ifMatch[1].trim();
            if (condition === 'Debug_ENAbLE' || condition === 'cUsToM dRaWiNg pHySiCs') {
              gameState.debug = true;
            }
          }
          currentSection = 'if';
          continue;
        }
        if (line.startsWith('WinCondition:')) {
          const wcMatch = line.match(/^WinCondition:\s*@([^@]+)@/);
          if (wcMatch) gameState.winCondition = wcMatch[1];
          continue;
        }
        if (line.startsWith('LoseCondition:')) {
          const lcMatch = line.match(/^LoseCondition:\s*@([^@]+)@/);
          if (lcMatch) gameState.loseCondition = lcMatch[1];
          continue;
        }
        if (line.startsWith('Sprites:') || line.startsWith('Music:') || line.startsWith('Sound:')) {
          currentSection = 'resources';
          continue;
        }

        // Inside sections
        if (currentSection === 'var') {
          const atMatches = [...line.matchAll(/@([^@]+)@/g)];
          for (let m of atMatches) {
            const expr = m[1].trim();
            const eq = expr.indexOf('=');
            if (eq > -1) {
              const key = expr.substring(0, eq).trim();
              let val = expr.substring(eq+1).trim();
              // try to evaluate numeric
              if (!isNaN(parseFloat(val))) val = parseFloat(val);
              gameState.vars[key] = val;
            }
          }
          continue;
        }

        if (currentSection === 'physics') {
          const physMatch = line.match(/([a-z_]+)\s*=\s*@([^@]+)@/i);
          if (physMatch) {
            const key = physMatch[1];
            const val = parseFloat(physMatch[2]);
            if (!isNaN(val)) gameState.physics[key] = val;
          }
          continue;
        }

        if (currentSection === 'level' && levelData) {
          const whMatch = line.match(/@width=(\d+)@.*@height=(\d+)@/);
          if (whMatch) {
            levelData.width = parseInt(whMatch[1]);
            levelData.height = parseInt(whMatch[2]);
          } else if (line.startsWith('tiles:')) {
            // next lines are tile rows; we'll collect them in a loop
            let j = i+1;
            while (j < lines.length) {
              const tileLine = lines[j].trim();
              if (tileLine === '' || tileLine.startsWith('//')) { j++; continue; }
              if (tileLine.match(/^[01PE]+$/)) {
                levelData.tiles.push(tileLine);
                j++;
              } else {
                break;
              }
            }
            i = j-1; // advance main loop
          } else if (line.startsWith('properties:')) {
            // next lines have @...@
          } else {
            const atMatches = [...line.matchAll(/@([^@]+)@/g)];
            for (let m of atMatches) {
              const expr = m[1].trim();
              const eq = expr.indexOf('=');
              if (eq > -1) {
                const key = expr.substring(0, eq).trim();
                const val = expr.substring(eq+1).trim();
                levelData.props[key] = val;
              }
            }
          }
          continue;
        }

        if (currentSection === 'camera') {
          const atMatches = [...line.matchAll(/@([^@]+)@/g)];
          for (let m of atMatches) {
            const expr = m[1].trim();
            const eq = expr.indexOf('=');
            if (eq > -1) {
              const key = expr.substring(0, eq).trim();
              const val = expr.substring(eq+1).trim();
              if (key === 'follow') gameState.camera.follow = val;
              else if (key === 'bounds') {
                const b = val.replace(/[()]/g,'').split(',').map(Number);
                if (b.length===4) gameState.camera.bounds = { x1:b[0], y1:b[1], x2:b[2], y2:b[3] };
              }
            }
          }
          const dollarDirs = parseDollarBlock(line);
          if (dollarDirs.shake_on_hit) gameState.camera.shake_on_hit = true;
          continue;
        }

        // Object definition (Player, Enemy, NPC)
        const objMatch = line.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*:\s*@([^@]*)@(.*)$/);
        if (objMatch) {
          const name = objMatch[1];
          const inner = objMatch[2];
          const rest = objMatch[3];
          const attrs = parseAtBlock(inner);
          const dirs = parseDollarBlock(rest);
          // Create object with defaults
          let x = 100, y = 100;
          if (attrs.pos) {
            const pos = attrs.pos.replace(/[()]/g, '').split(',');
            if (pos.length === 2) { x = parseInt(pos[0]); y = parseInt(pos[1]); }
          }
          gameState.objects[name] = {
            name, type: name, attrs, dirs,
            x, y, vx: 0, vy: 0,
            width: 20, height: 20 // default size
          };
          continue;
        }

        // If inside a section we don't handle, skip
      }

      // After parsing, set level tiles into gameState
      if (levelData && levelData.tiles.length > 0) {
        gameState.currentLevel = levelData;
        // Place player and enemies from level tiles
        const tileW = 800 / levelData.width;
        const tileH = 600 / levelData.height;
        for (let row = 0; row < levelData.tiles.length; row++) {
          for (let col = 0; col < levelData.tiles[row].length; col++) {
            const ch = levelData.tiles[row][col];
            if (ch === 'P' && gameState.objects['Player']) {
              gameState.objects['Player'].x = col * tileW + tileW/2;
              gameState.objects['Player'].y = row * tileH + tileH/2;
            }
            if (ch === 'E') {
              // Create an enemy if none defined? We'll use existing Enemy or create one
              if (!gameState.objects['Enemy']) {
                gameState.objects['Enemy'] = { name: 'Enemy', type: 'Enemy', attrs: {}, dirs: { move: 'sin' }, x: col * tileW + tileW/2, y: row * tileH + tileH/2, vx: 0, vy: 0, width: 20, height: 20 };
              } else {
                // multiple enemies? We'll store as array? For simplicity, just one.
              }
            }
          }
        }
      }

      // ---------- Game Loop ----------
      function checkCollisions(obj1, obj2) {
        const dx = obj1.x - obj2.x;
        const dy = obj1.y - obj2.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        return dist < (obj1.width/2 + obj2.width/2);
      }

      function processEvents() {
        for (let ev of gameState.events) {
          if (ev.type === 'Collision') {
            // Check collisions between objects in ev.params list
            for (let i = 0; i < ev.params.length; i+=2) {
              const a = ev.params[i];
              const b = ev.params[i+1];
              if (!a || !b) continue;
              const objA = gameState.objects[a];
              const objB = gameState.objects[b];
              if (objA && objB && checkCollisions(objA, objB)) {
                // Execute actions
                for (let [action, val] of Object.entries(ev.actions)) {
                  if (action === 'if') {
                    // conditional: $if(lives<=0)
                    const cond = val; // e.g. lives<=0
                    // evaluate using vars
                    if (!evaluateExpr(cond)) continue;
                  } else if (action === 'score') {
                    if (val.startsWith('+=')) gameState.score += parseInt(val.substring(2)) || 10;
                    else if (val.startsWith('-=')) gameState.score -= parseInt(val.substring(2)) || 10;
                    else gameState.score = parseInt(val) || gameState.score;
                  } else if (action === 'lives') {
                    if (val.startsWith('+=')) gameState.lives += parseInt(val.substring(2)) || 1;
                    else if (val.startsWith('-=')) gameState.lives -= parseInt(val.substring(2)) || 1;
                    else gameState.lives = parseInt(val) || gameState.lives;
                  } else if (action === 'resetPos') {
                    if (objA.name === 'Player') { objA.x = 100; objA.y = 300; }
                  } else if (action === 'gameOver') {
                    gameState.gameOver = true;
                  }
                }
              }
            }
          }
        }
      }

      function gameLoop() {
        if (gameState.gameOver) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0,0,800,600);
          ctx.fillStyle = 'red';
          ctx.font = '40px monospace';
          ctx.fillText('GAME OVER', 200, 300);
          gameState.animationFrame = requestAnimationFrame(gameLoop);
          return;
        }
        if (gameState.win) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0,0,800,600);
          ctx.fillStyle = 'gold';
          ctx.font = '40px monospace';
          ctx.fillText('YOU WIN!', 250, 300);
          gameState.animationFrame = requestAnimationFrame(gameLoop);
          return;
        }

        gameState.frame++;

        // Apply physics
        Object.values(gameState.objects).forEach(obj => {
          obj.vy += gameState.physics.gravity;
          obj.vx *= (1 - gameState.physics.friction);
          const speed = Math.sqrt(obj.vx*obj.vx + obj.vy*obj.vy);
          if (speed > gameState.physics.maxSpeed) {
            obj.vx *= gameState.physics.maxSpeed / speed;
            obj.vy *= gameState.physics.maxSpeed / speed;
          }
          obj.x += obj.vx;
          obj.y += obj.vy;

          // bounds
          if (obj.x < 0) { obj.x = 0; obj.vx *= -0.5; }
          if (obj.x > 800) { obj.x = 800; obj.vx *= -0.5; }
          if (obj.y < 0) { obj.y = 0; obj.vy *= -0.5; }
          if (obj.y > 600) { obj.y = 600; obj.vy *= -0.5; }
        });

        // Player control
        const player = gameState.objects['Player'];
        if (player) {
          if (gameState.keys['ArrowLeft'] || gameState.keys['a']) player.vx -= 0.5;
          if (gameState.keys['ArrowRight'] || gameState.keys['d']) player.vx += 0.5;
          if (gameState.keys['ArrowUp'] || gameState.keys['w']) player.vy -= 0.5;
          if (gameState.keys['ArrowDown'] || gameState.keys['s']) player.vy += 0.5;
          // limit speed from dirs
          if (player.dirs.speed) {
            let sp = parseFloat(player.dirs.speed);
            if (!isNaN(sp)) {
              if (Math.abs(player.vx) > sp) player.vx = Math.sign(player.vx) * sp;
              if (Math.abs(player.vy) > sp) player.vy = Math.sign(player.vy) * sp;
            }
          }
        }

        // Enemy AI based on $move
        const enemy = gameState.objects['Enemy'];
        if (enemy && enemy.dirs.move) {
          if (enemy.dirs.move === 'sin') {
            enemy.x += Math.sin(gameState.frame * 0.05) * 2;
          } else if (enemy.dirs.move === 'random') {
            if (gameState.frame % 60 === 0) {
              enemy.vx = (Math.random() - 0.5) * 4;
              enemy.vy = (Math.random() - 0.5) * 4;
            }
          }
        }

        // Process collisions
        processEvents();

        // Check win/lose conditions
        if (gameState.winCondition) {
          if (evaluateExpr(gameState.winCondition)) gameState.win = true;
        }
        if (gameState.loseCondition) {
          if (evaluateExpr(gameState.loseCondition)) gameState.gameOver = true;
        }

        // Draw everything
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, 800, 600);

        // Draw level tiles
        if (gameState.currentLevel && gameState.currentLevel.tiles.length) {
          const level = gameState.currentLevel;
          const tileW = 800 / level.width;
          const tileH = 600 / level.height;
          level.tiles.forEach((row, y) => {
            for (let x = 0; x < row.length; x++) {
              const ch = row[x];
              if (ch === '1') {
                ctx.fillStyle = '#666';
                ctx.fillRect(x*tileW, y*tileH, tileW-1, tileH-1);
              } else if (ch === 'E') {
                ctx.fillStyle = '#f44';
                ctx.fillRect(x*tileW, y*tileH, tileW-1, tileH-1);
              } else if (ch === 'P') {
                // player tile, but we draw player separately
              }
            }
          });
        }

        // Draw objects
        Object.entries(gameState.objects).forEach(([name, obj]) => {
          if (name === 'Player') {
            ctx.fillStyle = '#0f0';
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, 15, 0, 2*Math.PI);
            ctx.fill();
          } else {
            ctx.fillStyle = '#f90';
            ctx.fillRect(obj.x-10, obj.y-10, 20, 20);
          }
        });

        // Camera follow
        if (gameState.camera.follow && gameState.objects[gameState.camera.follow]) {
          const target = gameState.objects[gameState.camera.follow];
          // simple: keep target in center
          // we can adjust canvas transform but for simplicity, we'll just draw as is
        }

        // Debug overlay
        if (gameState.debug) {
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.font = '12px monospace';
          ctx.fillText(`Objects: ${Object.keys(gameState.objects).length}`, 10, 90);
          ctx.fillText(`Frame: ${gameState.frame}`, 10, 110);
        }

        // HUD
        ctx.fillStyle = '#fff';
        ctx.font = '20px monospace';
        ctx.fillText(`Score: ${gameState.score}`, 10, 30);
        ctx.fillText(`Lives: ${gameState.lives}`, 10, 60);

        gameState.animationFrame = requestAnimationFrame(gameLoop);
      }

      // Keyboard handling
      window.addEventListener('keydown', (e) => {
        if (modal.classList.contains('active')) {
          gameState.keys[e.key] = true;
        }
      });
      window.addEventListener('keyup', (e) => {
        if (modal.classList.contains('active')) {
          delete gameState.keys[e.key];
        }
      });

      gameLoop();
    }

    // ========== AUDIO PLAYER SETUP (FULL Web Audio) ==========
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    document.body.addEventListener('click', () => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: true });

    // Define players
    const players = [
      { id: 'lobby-music', name: 'Music', toggleId: 'music-toggle', selectId: 'song-select', apiPath: 'audio' },
      { id: 'arcade-fx', name: 'Arcade FX', toggleId: 'fx-toggle', selectId: 'fx-select', apiPath: 'Arcade_FX' },
      { id: 'funny-sounds', name: 'Funny', toggleId: 'funny-toggle', selectId: 'funny-select', apiPath: 'Funny_Sound_Effects' },
      { id: 'human-sounds', name: 'Human', toggleId: 'human-toggle', selectId: 'human-select', apiPath: 'Human_Sounds' }
    ];

    const nodes = {};

    // Master effects
    const masterGain = audioCtx.createGain();
    const masterCompressor = audioCtx.createDynamicsCompressor();
    masterCompressor.threshold.value = -18;
    masterCompressor.knee.value = 40;
    masterCompressor.ratio.value = 12;
    masterCompressor.attack.value = 0.003;
    masterCompressor.release.value = 0.25;

    // Reverb
    const reverbNode = audioCtx.createConvolver();
    const reverbReturnGain = audioCtx.createGain();
    reverbReturnGain.gain.value = 0;
    const sampleRate = audioCtx.sampleRate;
    const length = sampleRate * 2;
    const impulse = audioCtx.createBuffer(2, length, sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = impulse.getChannelData(ch);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sampleRate * 0.3));
      }
    }
    reverbNode.buffer = impulse;

    // Delay
    const delayNode = audioCtx.createDelay(2.0);
    delayNode.delayTime.value = 0.3;
    const delayReturnGain = audioCtx.createGain();
    delayReturnGain.gain.value = 0;
    const delayFeedback = audioCtx.createGain();
    delayFeedback.gain.value = 0.3;
    delayNode.connect(delayFeedback);
    delayFeedback.connect(delayNode);

    masterGain.connect(masterCompressor);
    masterCompressor.connect(audioCtx.destination);
    masterCompressor.connect(reverbNode);
    reverbNode.connect(reverbReturnGain);
    reverbReturnGain.connect(audioCtx.destination);
    masterCompressor.connect(delayNode);
    delayNode.connect(delayReturnGain);
    delayReturnGain.connect(audioCtx.destination);

    const masterNodes = { masterGain, masterCompressor, reverbReturnGain, delayReturnGain };

    // Create per-channel processing
    players.forEach(p => {
      const audio = document.getElementById(p.id);
      const source = audioCtx.createMediaElementSource(audio);

      const gainNode = audioCtx.createGain();
      const panNode = audioCtx.createStereoPanner();
      const lowEQ = audioCtx.createBiquadFilter();
      lowEQ.type = 'lowshelf';
      lowEQ.frequency.value = 320;
      lowEQ.gain.value = 0;
      const midEQ = audioCtx.createBiquadFilter();
      midEQ.type = 'peaking';
      midEQ.frequency.value = 1000;
      midEQ.Q.value = 1;
      midEQ.gain.value = 0;
      const highEQ = audioCtx.createBiquadFilter();
      highEQ.type = 'highshelf';
      highEQ.frequency.value = 3200;
      highEQ.gain.value = 0;
      const compressor = audioCtx.createDynamicsCompressor();
      compressor.threshold.value = -24;
      compressor.knee.value = 30;
      compressor.ratio.value = 12;
      compressor.attack.value = 0.003;
      compressor.release.value = 0.25;
      const gateGain = audioCtx.createGain();
      gateGain.gain.value = 1;
      const reverbSend = audioCtx.createGain();
      reverbSend.gain.value = 0;
      const delaySend = audioCtx.createGain();
      delaySend.gain.value = 0;

      source.connect(gateGain);
      gateGain.connect(compressor);
      compressor.connect(lowEQ);
      lowEQ.connect(midEQ);
      midEQ.connect(highEQ);
      highEQ.connect(panNode);
      panNode.connect(gainNode);
      gainNode.connect(masterGain);
      gainNode.connect(reverbSend);
      gainNode.connect(delaySend);
      reverbSend.connect(reverbNode);
      delaySend.connect(delayNode);

      nodes[p.id] = {
        source, gainNode, panNode, lowEQ, midEQ, highEQ, compressor, gateGain,
        reverbSend, delaySend,
        audio, toggleBtn: document.getElementById(p.toggleId), selectEl: document.getElementById(p.selectId)
      };
    });

    // ========== CREATE MIXER UI ==========
    const mixerPanel = document.getElementById('mixerPanel');

    function createChannelUI(playerId, playerName) {
      const n = nodes[playerId];
      const channelDiv = document.createElement('div');
      channelDiv.className = 'mixer-channel';
      channelDiv.innerHTML = `
        <div class="channel-header">${playerName}</div>
        <div class="control-row"><span class="control-label">Vol</span><input type="range" min="0" max="100" value="100" class="volume-slider"></div>
        <div class="control-row"><span class="control-label">Pan</span><input type="range" min="-100" max="100" value="0" class="pan-slider"></div>
        <div class="eq-row">
          <div class="eq-band"><span>L</span><input type="range" min="-20" max="20" value="0" class="eq-low"></div>
          <div class="eq-band"><span>M</span><input type="range" min="-20" max="20" value="0" class="eq-mid"></div>
          <div class="eq-band"><span>H</span><input type="range" min="-20" max="20" value="0" class="eq-high"></div>
        </div>
        <div class="control-row"><span class="control-label">Reverb</span><input type="range" min="0" max="100" value="0" class="reverb-send"></div>
        <div class="control-row"><span class="control-label">Delay</span><input type="range" min="0" max="100" value="0" class="delay-send"></div>
        <div class="control-row"><span class="control-label">Comp</span><input type="range" min="-40" max="0" value="-24" class="comp-thresh"></div>
        <div class="control-row"><span class="control-label">Gate</span><input type="range" min="0" max="1" step="0.01" value="0" class="gate-thresh"></div>
        <div class="button-group">
          <button class="mixer-btn mute-btn">M</button>
          <button class="mixer-btn solo-btn">S</button>
          <button class="mixer-btn random-btn">🎲</button>
        </div>
      `;
      mixerPanel.appendChild(channelDiv);

      channelDiv.querySelector('.volume-slider').addEventListener('input', (e) => {
        n.gainNode.gain.value = e.target.value / 100;
      });
      channelDiv.querySelector('.pan-slider').addEventListener('input', (e) => {
        n.panNode.pan.value = e.target.value / 100;
      });
      channelDiv.querySelector('.eq-low').addEventListener('input', (e) => {
        n.lowEQ.gain.value = e.target.value;
      });
      channelDiv.querySelector('.eq-mid').addEventListener('input', (e) => {
        n.midEQ.gain.value = e.target.value;
      });
      channelDiv.querySelector('.eq-high').addEventListener('input', (e) => {
        n.highEQ.gain.value = e.target.value;
      });
      channelDiv.querySelector('.reverb-send').addEventListener('input', (e) => {
        n.reverbSend.gain.value = e.target.value / 100;
      });
      channelDiv.querySelector('.delay-send').addEventListener('input', (e) => {
        n.delaySend.gain.value = e.target.value / 100;
      });
      channelDiv.querySelector('.comp-thresh').addEventListener('input', (e) => {
        n.compressor.threshold.value = e.target.value;
      });
      const muteBtn = channelDiv.querySelector('.mute-btn');
      muteBtn.addEventListener('click', () => {
        if (n.gainNode.gain.value === 0) {
          n.gainNode.gain.value = 1;
          muteBtn.classList.remove('active');
        } else {
          n.gainNode.gain.value = 0;
          muteBtn.classList.add('active');
        }
      });
      const soloBtn = channelDiv.querySelector('.solo-btn');
      soloBtn.addEventListener('click', () => {
        const isSolo = soloBtn.classList.contains('active');
        if (isSolo) {
          soloBtn.classList.remove('active');
          Object.values(nodes).forEach(n => n.gainNode.gain.value = 1);
        } else {
          document.querySelectorAll('.solo-btn').forEach(btn => btn.classList.remove('active'));
          soloBtn.classList.add('active');
          Object.values(nodes).forEach((n, idx) => {
            if (n.audio.id === playerId) {
              n.gainNode.gain.value = 1;
            } else {
              n.gainNode.gain.value = 0;
            }
          });
        }
      });
      const randomBtn = channelDiv.querySelector('.random-btn');
      randomBtn.addEventListener('click', () => {
        const selectEl = n.selectEl;
        if (selectEl && selectEl.options.length > 1) {
          const randomIndex = Math.floor(Math.random() * (selectEl.options.length - 1)) + 1;
          selectEl.selectedIndex = randomIndex;
          selectEl.dispatchEvent(new Event('change'));
        }
      });
    }

    createChannelUI('lobby-music', 'MUSIC');
    createChannelUI('arcade-fx', 'ARCADE');
    createChannelUI('funny-sounds', 'FUNNY');
    createChannelUI('human-sounds', 'HUMAN');

    const masterDiv = document.createElement('div');
    masterDiv.className = 'mixer-channel master-channel';
    masterDiv.innerHTML = `
      <div class="channel-header">MASTER</div>
      <div class="control-row"><span class="control-label">Vol</span><input type="range" min="0" max="100" value="100" id="master-vol"></div>
      <div class="control-row"><span class="control-label">Comp</span><input type="range" min="-40" max="0" value="-18" id="master-comp-thresh"></div>
      <div class="control-row"><span class="control-label">Reverb</span><input type="range" min="0" max="100" value="0" id="master-reverb"></div>
      <div class="control-row"><span class="control-label">Delay</span><input type="range" min="0" max="100" value="0" id="master-delay"></div>
      <div class="button-group"><button class="mixer-btn" id="master-mute">M</button></div>
    `;
    mixerPanel.appendChild(masterDiv);

    document.getElementById('master-vol').addEventListener('input', (e) => {
      masterNodes.masterGain.gain.value = e.target.value / 100;
    });
    document.getElementById('master-comp-thresh').addEventListener('input', (e) => {
      masterNodes.masterCompressor.threshold.value = e.target.value;
    });
    document.getElementById('master-reverb').addEventListener('input', (e) => {
      masterNodes.reverbReturnGain.gain.value = e.target.value / 100;
    });
    document.getElementById('master-delay').addEventListener('input', (e) => {
      masterNodes.delayReturnGain.gain.value = e.target.value / 100;
    });
    document.getElementById('master-mute').addEventListener('click', (e) => {
      if (masterNodes.masterGain.gain.value === 0) {
        masterNodes.masterGain.gain.value = 1;
        e.target.classList.remove('active');
      } else {
        masterNodes.masterGain.gain.value = 0;
        e.target.classList.add('active');
      }
    });

    // ========== PLAYER LOADING (FULL) ==========
    function createPlayer(audioId, toggleId, selectId, apiPath, defaultName = 'Default') {
      const audio = document.getElementById(audioId);
      const toggleBtn = document.getElementById(toggleId);
      const selectEl = document.getElementById(selectId);
      let isPlaying = false;
      let playlist = [];
      let currentIndex = 0;

      const apiUrl = `https://api.github.com/repos/sussybocca/PackArcade/contents/public/${apiPath}`;

      async function loadPlaylist() {
        try {
          const response = await fetch(apiUrl);
          if (!response.ok) throw new Error('GitHub API error');
          const data = await response.json();
          const mp3Files = data.filter(item => item.name.toLowerCase().endsWith('.mp3'));
          if (mp3Files.length === 0) throw new Error('No MP3 files found');
          playlist = mp3Files.map(file => ({
            name: file.name.replace(/\.mp3$/i, ''),
            url: `https://raw.githubusercontent.com/sussybocca/PackArcade/main/public/${apiPath}/${encodeURIComponent(file.name)}`
          }));
          selectEl.innerHTML = '';
          playlist.forEach((item, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = item.name;
            selectEl.appendChild(option);
          });
          currentIndex = 0;
          audio.src = playlist[0].url;
          audio.load();
          toggleBtn.disabled = false;
          selectEl.disabled = false;
        } catch (error) {
          console.warn(`Failed to load ${apiPath}:`, error);
          playlist = [{ name: defaultName, url: `${apiPath}/default.mp3` }];
          selectEl.innerHTML = `<option value="0">${defaultName} (fallback)</option>`;
          audio.src = playlist[0].url;
          audio.load();
        }
      }

      selectEl.addEventListener('change', () => {
        const index = parseInt(selectEl.value, 10);
        if (!isNaN(index) && playlist[index]) {
          currentIndex = index;
          audio.src = playlist[currentIndex].url;
          audio.load();
          if (isPlaying) {
            audio.play().catch(e => console.warn('Play after change failed:', e));
          }
        }
      });

      toggleBtn.addEventListener('click', () => {
        if (isPlaying) {
          audio.pause();
          toggleBtn.innerHTML = toggleBtn.innerHTML.replace('🔊', '🔇');
          isPlaying = false;
        } else {
          audio.play()
            .then(() => {
              toggleBtn.innerHTML = toggleBtn.innerHTML.replace('🔇', '🔊');
              isPlaying = true;
            })
            .catch(e => {
              console.warn('Play failed:', e);
              toggleBtn.style.display = 'none';
            });
        }
      });

      loadPlaylist();
    }

    createPlayer('lobby-music', 'music-toggle', 'song-select', 'audio', 'LobbyMusic');
    createPlayer('arcade-fx', 'fx-toggle', 'fx-select', 'Arcade_FX', 'DefaultFX');
    createPlayer('funny-sounds', 'funny-toggle', 'funny-select', 'Funny_Sound_Effects', 'DefaultFunny');
    createPlayer('human-sounds', 'human-toggle', 'human-select', 'Human_Sounds', 'DefaultHuman');
  </script>
</body>
</html>
