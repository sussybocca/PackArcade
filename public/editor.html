<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackArcade Code Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <style>
        /* === YOUR ORIGINAL CSS (unchanged) === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 300px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            font-size: 14px;
            font-weight: 400;
            color: #ccc;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .file-actions button {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 5px;
            border-radius: 3px;
        }

        .file-actions button:hover {
            background: #3e3e42;
            color: #fff;
        }

        /* NEW: publish button style */
        .publish-btn {
            background: #4caf50 !important;
            color: white !important;
            padding: 5px 10px !important;
            border-radius: 4px !important;
            font-weight: bold;
        }

        .publish-btn:hover {
            background: #45a049 !important;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .tree-item {
            list-style: none;
            margin: 2px 0;
        }

        .tree-item-content {
            display: flex;
            align-items: center;
            padding: 5px;
            border-radius: 3px;
            cursor: pointer;
            user-select: none;
        }

        .tree-item-content:hover {
            background: #2a2d2e;
        }

        .tree-item-content.selected {
            background: #094771;
        }

        .tree-item-content i {
            width: 20px;
            color: #ccc;
            margin-right: 5px;
        }

        .tree-item-content .name {
            flex: 1;
            font-size: 13px;
        }

        .tree-item-content .item-actions {
            display: none;
            gap: 5px;
        }

        .tree-item-content:hover .item-actions {
            display: flex;
        }

        .item-actions button {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            padding: 2px;
        }

        .item-actions button:hover {
            color: #fff;
        }

        .children {
            padding-left: 20px;
        }

        /* Editor Styles */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .editor-tabs {
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            overflow-x: auto;
        }

        .tab {
            padding: 10px 15px;
            background: #2d2d30;
            color: #ccc;
            border-right: 1px solid #3e3e42;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .tab.active {
            background: #1e1e1e;
            color: #fff;
            border-bottom: 2px solid #007acc;
        }

        .tab button {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            padding: 2px;
        }

        .tab button:hover {
            color: #fff;
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
        }

        #code-editor {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .status-bar {
            background: #007acc;
            padding: 5px 15px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #252526;
            padding: 20px;
            border-radius: 5px;
            width: 400px;
            max-width: 90%;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #ccc;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            background: #3e3e42;
            border: 1px solid #555;
            color: #fff;
            border-radius: 3px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #007acc;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-actions button {
            padding: 8px 15px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .modal-actions button.primary {
            background: #007acc;
            color: #fff;
        }

        .modal-actions button.secondary {
            background: #3e3e42;
            color: #fff;
        }

        .drag-over {
            background: #094771 !important;
        }

        /* New styles for publish success */
        .publish-success {
            color: #4caf50;
            font-weight: bold;
        }
        .publish-error {
            color: #f44336;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>EXPLORER</h3>
                <div class="file-actions">
                    <button onclick="showNewFileModal()" title="New File"><i class="fas fa-file"></i></button>
                    <button onclick="showNewFolderModal()" title="New Folder"><i class="fas fa-folder"></i></button>
                    <button onclick="saveAllFiles()" title="Save All"><i class="fas fa-save"></i></button>
                    <!-- ADDED: Publish button -->
                    <button onclick="publishWebsite()" class="publish-btn" title="Publish Website"><i class="fas fa-globe"></i> Publish</button>
                </div>
            </div>
            <div class="file-tree" id="fileTree"></div>
        </div>

        <!-- Editor -->
        <div class="editor-container">
            <div class="editor-tabs" id="editorTabs"></div>
            <div class="editor-wrapper">
                <textarea id="code-editor"></textarea>
            </div>
            <div class="status-bar">
                <span id="statusMessage">Ready</span>
                <span id="cursorPosition">Ln 1, Col 1</span>
            </div>
        </div>
    </div>

    <!-- Modals (keep your original modals) -->
    <div class="modal" id="newItemModal">
        <div class="modal-content">
            <h3 id="modalTitle">New File</h3>
            <input type="text" id="itemName" placeholder="Enter name...">
            <select id="fileType" style="display: none;">
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="js">JavaScript</option>
                <option value="json">JSON</option>
            </select>
            <div class="modal-actions">
                <button class="secondary" onclick="closeModal()">Cancel</button>
                <button class="primary" onclick="createItem()">Create</button>
            </div>
        </div>
    </div>

    <div class="modal" id="configModal">
        <div class="modal-content">
            <h3>Supabase Config</h3>
            <textarea id="configJson" rows="10" style="width: 100%; background: #3e3e42; color: #fff; border: 1px solid #555; padding: 8px; margin-bottom: 15px;">{
  "name": "My Website",
  "template": "basic",
  "settings": {
    "theme": "dark",
    "analytics": true
  }
}</textarea>
            <div class="modal-actions">
                <button class="secondary" onclick="closeConfigModal()">Cancel</button>
                <button class="primary" onclick="saveConfig()">Save Config</button>
            </div>
        </div>
    </div>

    <!-- NEW: Publish Success Modal -->
    <div class="modal" id="publishSuccessModal">
        <div class="modal-content">
            <h3><i class="fas fa-check-circle" style="color: #4caf50;"></i> Published Successfully!</h3>
            <p>Your site is now live at:</p>
            <p><strong id="publishedUrl" style="color: #4caf50; word-break: break-all;"></strong></p>
            <div class="modal-actions">
                <button class="primary" onclick="window.open(document.getElementById('publishedUrl').textContent, '_blank')">
                    <i class="fas fa-external-link-alt"></i> Visit Site
                </button>
                <button class="secondary" onclick="closePublishModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script>
        // === YOUR ORIGINAL JAVASCRIPT (exactly as you had it) ===
        // State
        let files = [];
        let currentFile = null;
        let editor = null;
        let sessionId = localStorage.getItem('sessionId') || generateSessionId();
        let subdomain = new URLSearchParams(window.location.search).get('subdomain') || '';

        // Initialize CodeMirror
        window.onload = function() {
            editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
                lineNumbers: true,
                mode: 'htmlmixed',
                theme: 'monokai',
                autoCloseTags: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                indentUnit: 4,
                tabSize: 4,
                lineWrapping: true,
                extraKeys: {
                    'Ctrl-S': function(cm) { saveCurrentFile(); },
                    'Cmd-S': function(cm) { saveCurrentFile(); }
                }
            });

            editor.on('change', function() {
                if (currentFile) {
                    currentFile.content = editor.getValue();
                    updateStatus('Unsaved changes');
                }
            });

            editor.on('cursorActivity', function() {
                let pos = editor.getCursor();
                document.getElementById('cursorPosition').textContent = `Ln ${pos.line + 1}, Col ${pos.ch + 1}`;
            });

            localStorage.setItem('sessionId', sessionId);
            loadUserFiles();
        };

        function generateSessionId() {
            return 'session_' + Math.random().toString(36).substr(2, 9);
        }

        // File Tree Functions
        function renderFileTree() {
            const tree = document.getElementById('fileTree');
            tree.innerHTML = '';
            
            const rootItems = files.filter(f => !f.parent);
            rootItems.forEach(item => renderTreeItem(item, tree));
        }

        function renderTreeItem(item, container, level = 0) {
            const li = document.createElement('li');
            li.className = 'tree-item';
            li.setAttribute('data-id', item.id);
            li.setAttribute('data-path', item.path || '');
            li.setAttribute('draggable', !item.isFolder);
            
            const div = document.createElement('div');
            div.className = `tree-item-content ${currentFile && currentFile.id === item.id ? 'selected' : ''}`;
            div.ondblclick = () => item.isFolder ? toggleFolder(item.id) : openFile(item);
            
            // Icon
            const icon = document.createElement('i');
            icon.className = item.isFolder ? 'fas fa-folder' : getFileIcon(item.name);
            div.appendChild(icon);
            
            // Name
            const name = document.createElement('span');
            name.className = 'name';
            name.textContent = item.name;
            div.appendChild(name);
            
            // Actions
            const actions = document.createElement('div');
            actions.className = 'item-actions';
            
            if (!item.isFolder) {
                const renameBtn = document.createElement('button');
                renameBtn.innerHTML = '<i class="fas fa-edit"></i>';
                renameBtn.onclick = (e) => { e.stopPropagation(); renameItem(item); };
                actions.appendChild(renameBtn);
                
                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
                deleteBtn.onclick = (e) => { e.stopPropagation(); deleteItem(item); };
                actions.appendChild(deleteBtn);
            }
            
            div.appendChild(actions);
            li.appendChild(div);
            
            // Children
            if (item.isFolder) {
                const children = document.createElement('ul');
                children.className = 'children';
                children.style.display = item.expanded ? 'block' : 'none';
                
                const folderChildren = files.filter(f => f.parent === item.id);
                folderChildren.forEach(child => renderTreeItem(child, children, level + 1));
                
                li.appendChild(children);
            }
            
            container.appendChild(li);
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop();
            const icons = {
                html: 'fab fa-html5',
                css: 'fab fa-css3-alt',
                js: 'fab fa-js',
                json: 'fas fa-code',
                txt: 'fas fa-file-alt',
                md: 'fas fa-markdown'
            };
            return icons[ext] || 'fas fa-file';
        }

        // File Operations
        function showNewFileModal() {
            document.getElementById('modalTitle').textContent = 'New File';
            document.getElementById('fileType').style.display = 'block';
            document.getElementById('itemName').value = '';
            document.getElementById('newItemModal').classList.add('active');
            window.currentAction = 'file';
        }

        function showNewFolderModal() {
            document.getElementById('modalTitle').textContent = 'New Folder';
            document.getElementById('fileType').style.display = 'none';
            document.getElementById('itemName').value = '';
            document.getElementById('newItemModal').classList.add('active');
            window.currentAction = 'folder';
        }

        function closeModal() {
            document.getElementById('newItemModal').classList.remove('active');
        }

        function createItem() {
            const name = document.getElementById('itemName').value;
            if (!name) return;

            if (window.currentAction === 'file') {
                const type = document.getElementById('fileType').value;
                createFile(name, type);
            } else {
                createFolder(name);
            }

            closeModal();
        }

        function createFile(name, type) {
            const templates = {
                html: '<!DOCTYPE html>\n<html>\n<head>\n    <title>My Page</title>\n</head>\n<body>\n    \n</body>\n</html>',
                css: '/* Styles */\n',
                js: '// JavaScript\n',
                json: '{\n    \n}'
            };

            const file = {
                id: 'file_' + Date.now(),
                name: name + '.' + type,
                content: templates[type],
                isFolder: false,
                expanded: false
            };

            files.push(file);
            renderFileTree();
            
            if (!currentFile) {
                openFile(file);
            }
        }

        function createFolder(name) {
            const folder = {
                id: 'folder_' + Date.now(),
                name: name,
                isFolder: true,
                expanded: true,
                children: []
            };

            files.push(folder);
            renderFileTree();
        }

        function openFile(file) {
            currentFile = file;
            editor.setValue(file.content || '');
            editor.setOption('mode', getModeFromFile(file.name));
            
            document.querySelectorAll('.tree-item-content').forEach(el => {
                el.classList.remove('selected');
            });
            
            const selectedEl = document.querySelector(`[data-id="${file.id}"] .tree-item-content`);
            if (selectedEl) selectedEl.classList.add('selected');
            
            updateTabs();
            updateStatus(`Editing ${file.name}`);
        }

        function getModeFromFile(filename) {
            const ext = filename.split('.').pop();
            const modes = {
                html: 'htmlmixed',
                css: 'css',
                js: 'javascript',
                json: 'application/json',
                md: 'markdown'
            };
            return modes[ext] || 'text/plain';
        }

        function toggleFolder(folderId) {
            const folder = files.find(f => f.id === folderId);
            if (folder) {
                folder.expanded = !folder.expanded;
                renderFileTree();
            }
        }

        function updateTabs() {
            const tabs = document.getElementById('editorTabs');
            tabs.innerHTML = '';
            
            if (currentFile) {
                const tab = document.createElement('div');
                tab.className = 'tab active';
                tab.innerHTML = `
                    <i class="${getFileIcon(currentFile.name)}"></i>
                    <span>${currentFile.name}</span>
                    <button onclick="closeFile()"><i class="fas fa-times"></i></button>
                `;
                tabs.appendChild(tab);
            }
        }

        function closeFile() {
            currentFile = null;
            editor.setValue('');
            updateTabs();
            updateStatus('Ready');
        }

        function saveCurrentFile() {
            if (currentFile) {
                updateStatus(`Saved ${currentFile.name}`);
            }
        }

        function saveAllFiles() {
            updateStatus('All files saved');
        }

        function updateStatus(message) {
            document.getElementById('statusMessage').textContent = message;
        }

        // Supabase Config
        function showConfigModal() {
            document.getElementById('configModal').classList.add('active');
        }

        function closeConfigModal() {
            document.getElementById('configModal').classList.remove('active');
        }

        function saveConfig() {
            try {
                const config = JSON.parse(document.getElementById('configJson').value);
                // Save config to Supabase
                fetch('/.netlify/functions/save-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subdomain: subdomain,
                        config: config,
                        sessionId: sessionId
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        updateStatus('Config saved successfully');
                        closeConfigModal();
                    }
                });
            } catch (e) {
                alert('Invalid JSON');
            }
        }

        // Load user files from Supabase
        function loadUserFiles() {
            if (subdomain) {
                fetch(`/.netlify/functions/get-files?subdomain=${subdomain}&sessionId=${sessionId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.files) {
                        files = data.files;
                        renderFileTree();
                    }
                });
            }
        }

        // === NEW: Publish function (add this at the end, before keyboard shortcuts) ===
        function publishWebsite() {
            if (!subdomain) {
                alert('No subdomain specified. Please create a site from the dashboard first.');
                return;
            }

            if (files.length === 0) {
                alert('No files to publish');
                return;
            }

            // Check if index.html exists
            const hasIndex = files.some(f => f.name === 'index.html');
            if (!hasIndex) {
                if (!confirm('No index.html found. Your site might not work properly. Continue anyway?')) {
                    return;
                }
            }

            updateStatus('Publishing...');
            
            const filesData = files.map(f => ({
                name: f.name,
                path: f.path || '/',
                content: f.content || '',
                type: f.name.split('.').pop(),
                isFolder: f.isFolder || false,
                parentFolder: f.parent
            }));

            const config = {}; // You can optionally include config from modal

            fetch('/.netlify/functions/create-subdomains', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    subdomain: subdomain,
                    files: filesData,
                    sessionId: sessionId,
                    config: config
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const url = `https://${subdomain}.packarcade.xyz`;
                    updateStatus(`Published successfully!`);
                    
                    // Show success modal
                    document.getElementById('publishedUrl').textContent = url;
                    document.getElementById('publishSuccessModal').classList.add('active');
                } else {
                    updateStatus('Publish failed: ' + (data.error || 'Unknown error'));
                    alert('Publish failed: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(err => {
                updateStatus('Publish error');
                alert('Error publishing: ' + err.message);
            });
        }

        function closePublishModal() {
            document.getElementById('publishSuccessModal').classList.remove('active');
        }

        // Add keyboard shortcuts (keep your original)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveCurrentFile();
            }
        });
    </script>
</body>
</html>
