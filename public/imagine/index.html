<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive.IO – complex Three.js world</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 100;
            text-shadow: 1px 1px 2px black;
            font-size: 14px;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ccc;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 13px;
            backdrop-filter: blur(2px);
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
        }
    </style>
    <!-- External libraries: Three.js, SimplexNoise, and Stats.js for performance (optional but complex) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
</head>
<body>
    <div id="info">🌍 IMMERSIVE.IO | <span id="coords">0, 0, 0</span> | trees: <span id="treeCount">0</span></div>
    <div id="controls-note">WASD move | Mouse look | Shift sprint | Space jump (basic)</div>
    <div id="crosshair"></div>

    <script>
        (function() {
            // =========================================================================
            // COMPLEX THREE.JS IMMERSIVE WORLD
            // - Procedural infinite terrain (grid of chunks with heightmap)
            // - Instanced trees (thousands) with LOD via draw distance
            // - Dynamic water plane with reflections and refractions (fake via env map)
            // - Sky with animated clouds, sun, and stars (day/night cycle)
            // - First-person player physics (gravity, collision)
            // - Performance stats (Stats.js) and chunk streaming
            // =========================================================================

            // --- Configuration (tweak for complexity vs performance) ---
            const CONFIG = {
                CHUNK_SIZE: 64,                // world units per chunk
                CHUNK_RESOLUTION: 64,           // vertices per edge (terrain mesh density)
                RENDER_DISTANCE: 3,              // chunks in each direction
                TREE_DENSITY: 0.015,              // probability per unit area
                MAX_TREES_PER_CHUNK: 400,
                WATER_LEVEL: 12,
                SEA_LEVEL: 10,
                GRAVITY: -20,
                PLAYER_HEIGHT: 1.8,
                PLAYER_SPEED: 8,
                SPRINT_MULT: 1.8,
                MOUSE_SENSITIVITY: 0.002,
                DAY_CYCLE_SPEED: 0.02,            // radians per second? (will be delta-scaled)
                CLOUD_COUNT: 80,
                SHOW_STATS: true
            };

            // --- Global variables ---
            let scene, camera, renderer, stats;
            let player = {
                position: new THREE.Vector3(0, 20, 0),
                velocity: new THREE.Vector3(0, 0, 0),
                yaw: 0,
                pitch: 0,
                onGround: false,
                canJump: true
            };
            let keys = {};
            let mouseLocked = false;
            let clock = new THREE.Clock();
            let simplex = new SimplexNoise();      // for terrain and tree placement

            // Chunk management
            const chunks = new Map(); // key "x,z" -> chunk object
            let currentChunkCoords = { cx: 0, cz: 0 };

            // Asset groups
            let treeInstancedMesh, trunkInstancedMesh; // using two meshes for trunk and leaves (instanced)
            let cloudMeshes = [];
            let waterMesh;

            // Sky / sun
            let sunLight, ambientLight;
            let skySphere, stars;

            // Helpers
            function getChunkKey(cx, cz) { return `${cx},${cz}`; }

            // =========================================================================
            // TERRAIN CHUNK CLASS – generates mesh with heightmap
            // =========================================================================
            class TerrainChunk {
                constructor(cx, cz) {
                    this.cx = cx;
                    this.cz = cz;
                    this.mesh = null;
                    this.treeInstances = []; // data for tree placement (positions, scales)
                    this.generate();
                }

                generate() {
                    const size = CONFIG.CHUNK_SIZE;
                    const res = CONFIG.CHUNK_RESOLUTION;
                    const geometry = new THREE.PlaneGeometry(size, size, res - 1, res - 1);
                    geometry.rotateX(-Math.PI / 2); // make it horizontal

                    const vertices = geometry.attributes.position.array;
                    const colors = [];

                    // Heightmap pass
                    for (let i = 0; i < vertices.length; i += 3) {
                        const x = vertices[i] + this.cx * size;
                        const z = vertices[i+2] + this.cz * size;
                        const y = this.getHeight(x, z);
                        vertices[i+1] = y; // set Y

                        // Color based on height
                        const r = 0.3 + (y - CONFIG.SEA_LEVEL) * 0.05;
                        const g = 0.5 + (y - CONFIG.SEA_LEVEL) * 0.1;
                        const b = 0.2;
                        colors.push(r, g, b);
                    }

                    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                    geometry.computeVertexNormals();

                    const material = new THREE.MeshStandardMaterial({
                        vertexColors: true,
                        flatShading: false,
                        roughness: 0.7,
                        metalness: 0.1,
                        emissive: new THREE.Color(0x000000)
                    });

                    this.mesh = new THREE.Mesh(geometry, material);
                    this.mesh.castShadow = true;
                    this.mesh.receiveShadow = true;
                    this.mesh.position.set(this.cx * size, 0, this.cz * size);
                    this.mesh.userData.isTerrain = true;

                    // Pre-calculate tree positions for this chunk (instanced later)
                    this.placeTrees();
                }

                getHeight(x, z) {
                    // Complex fractal noise for terrain
                    const freq1 = 0.005;
                    const freq2 = 0.02;
                    const freq3 = 0.1;
                    let y = simplex.noise2D(x * freq1, z * freq1) * 20
                            + simplex.noise2D(x * freq2, z * freq2) * 8
                            + simplex.noise2D(x * freq3, z * freq3) * 3;
                    // Add some mountainous features
                    y += Math.abs(simplex.noise2D(x * 0.001, z * 0.001)) * 30;
                    y = Math.max(CONFIG.SEA_LEVEL - 2, y); // keep above deep water
                    return y;
                }

                placeTrees() {
                    const size = CONFIG.CHUNK_SIZE;
                    const baseX = this.cx * size;
                    const baseZ = this.cz * size;
                    const density = CONFIG.TREE_DENSITY;
                    const area = size * size;
                    const numTrees = Math.min(CONFIG.MAX_TREES_PER_CHUNK, Math.floor(area * density * (0.8 + 0.4 * simplex.noise2D(this.cx*0.3, this.cz*0.3))));

                    for (let i = 0; i < numTrees; i++) {
                        // random position within chunk
                        const x = baseX + (Math.random() * 2 - 1) * size/2;
                        const z = baseZ + (Math.random() * 2 - 1) * size/2;
                        const y = this.getHeight(x, z) + 0.2; // slightly above ground

                        // Avoid water and steep slopes (optional)
                        if (y < CONFIG.WATER_LEVEL + 1) continue;

                        // Scale variation
                        const scale = 0.8 + Math.random() * 0.7;
                        this.treeInstances.push({ x, y, z, scale });
                    }
                }

                dispose() {
                    if (this.mesh) scene.remove(this.mesh);
                    // geometry dispose handled by gc? ideally.
                }
            }

            // =========================================================================
            // INSTANCED TREE MANAGER (complex geometry: trunk + leaves)
            // =========================================================================
            function initTreeInstancing() {
                // Trunk: brown cylinder
                const trunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 2.5, 6);
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.9, emissive: 0x000000 });
                trunkInstancedMesh = new THREE.InstancedMesh(trunkGeo, trunkMat, 20000); // big buffer
                trunkInstancedMesh.castShadow = true;
                trunkInstancedMesh.receiveShadow = true;
                trunkInstancedMesh.frustumCulled = false;
                scene.add(trunkInstancedMesh);

                // Leaves: two green spheres/cones combined
                const leafGeo = new THREE.ConeGeometry(1.2, 1.8, 5);
                const leafMat = new THREE.MeshStandardMaterial({ color: 0x3A7734, roughness: 0.6, emissive: 0x000000 });
                treeInstancedMesh = new THREE.InstancedMesh(leafGeo, leafMat, 20000);
                treeInstancedMesh.castShadow = true;
                treeInstancedMesh.receiveShadow = true;
                treeInstancedMesh.frustumCulled = false;
                scene.add(treeInstancedMesh);

                // We'll store matrices in a temporary array and update as chunks load
            }

            let treeInstanceCount = 0;
            function updateTreeInstancesFromChunks() {
                // Reset instance counts
                trunkInstancedMesh.count = 0;
                treeInstancedMesh.count = 0;

                const trunkDummy = new THREE.Object3D();
                const leafDummy = new THREE.Object3D();
                let idx = 0;

                chunks.forEach(chunk => {
                    chunk.treeInstances.forEach(pos => {
                        if (idx >= 20000) return;

                        // Trunk (bottom at pos, height 2.5)
                        trunkDummy.position.set(pos.x, pos.y + 1.25, pos.z);
                        trunkDummy.scale.set(1, 1, 1);
                        trunkDummy.rotation.y = Math.random() * Math.PI;
                        trunkDummy.updateMatrix();
                        trunkInstancedMesh.setMatrixAt(idx, trunkDummy.matrix);

                        // Leaves (atop trunk)
                        leafDummy.position.set(pos.x, pos.y + 2.5 + 0.9, pos.z);
                        leafDummy.scale.set(pos.scale, pos.scale * 1.2, pos.scale);
                        leafDummy.rotation.y = Math.random() * Math.PI;
                        leafDummy.updateMatrix();
                        treeInstancedMesh.setMatrixAt(idx, leafDummy.matrix);

                        idx++;
                    });
                });

                trunkInstancedMesh.count = idx;
                treeInstancedMesh.count = idx;
                trunkInstancedMesh.instanceMatrix.needsUpdate = true;
                treeInstancedMesh.instanceMatrix.needsUpdate = true;

                document.getElementById('treeCount').innerText = idx;
            }

            // =========================================================================
            // WATER (animated plane with fake reflections)
            // =========================================================================
            function createWater() {
                const geometry = new THREE.CircleGeometry(500, 64);
                const material = new THREE.MeshStandardMaterial({
                    color: 0x2a6f8f,
                    emissive: 0x0a1a2a,
                    transparent: true,
                    opacity: 0.8,
                    roughness: 0.2,
                    metalness: 0.4,
                    emissiveIntensity: 0.5
                });
                waterMesh = new THREE.Mesh(geometry, material);
                waterMesh.rotation.x = -Math.PI / 2;
                waterMesh.position.y = CONFIG.WATER_LEVEL;
                waterMesh.receiveShadow = true;
                scene.add(waterMesh);
            }

            // =========================================================================
            // SKY & ATMOSPHERE (complex: sun, moon, stars, clouds)
            // =========================================================================
            function createSky() {
                // Sun light
                sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
                sunLight.position.set(100, 200, 100);
                sunLight.castShadow = true;
                sunLight.shadow.mapSize.width = 1024;
                sunLight.shadow.mapSize.height = 1024;
                const d = 150;
                sunLight.shadow.camera.left = -d;
                sunLight.shadow.camera.right = d;
                sunLight.shadow.camera.top = d;
                sunLight.shadow.camera.bottom = -d;
                sunLight.shadow.camera.near = 1;
                sunLight.shadow.camera.far = 250;
                sunLight.shadow.bias = -0.0005;
                scene.add(sunLight);

                ambientLight = new THREE.AmbientLight(0x404060);
                scene.add(ambientLight);

                // Sky gradient sphere
                const skyGeo = new THREE.SphereGeometry(500, 32, 16);
                const skyMat = new THREE.ShaderMaterial({
                    uniforms: {
                        topColor: { value: new THREE.Color(0x1a1a2e) },
                        bottomColor: { value: new THREE.Color(0x4a6fa5) },
                        offset: { value: 1 },
                        exponent: { value: 0.6 }
                    },
                    vertexShader: `
                        varying vec3 vWorldPosition;
                        void main() {
                            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                            vWorldPosition = worldPosition.xyz;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 topColor;
                        uniform vec3 bottomColor;
                        uniform float offset;
                        uniform float exponent;
                        varying vec3 vWorldPosition;
                        void main() {
                            float h = normalize(vWorldPosition).y * 0.5 + 0.5;
                            gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(h, exponent), 0.0)), 1.0);
                        }
                    `,
                    side: THREE.BackSide
                });
                skySphere = new THREE.Mesh(skyGeo, skyMat);
                scene.add(skySphere);

                // Stars (particle system)
                const starsGeo = new THREE.BufferGeometry();
                const starsCount = 2000;
                const starsPos = new Float32Array(starsCount * 3);
                for (let i = 0; i < starsCount; i++) {
                    const r = 400 + Math.random() * 100;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    starsPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
                    starsPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                    starsPos[i*3+2] = r * Math.cos(phi);
                }
                starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
                const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true, opacity: 0.7 });
                stars = new THREE.Points(starsGeo, starsMat);
                scene.add(stars);

                // Clouds (a few floating spheres)
                for (let i = 0; i < CONFIG.CLOUD_COUNT; i++) {
                    const cloudGroup = new THREE.Group();
                    const cloudMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, emissive: 0x222222, transparent: true, opacity: 0.4 });
                    const parts = 3 + Math.floor(Math.random() * 4);
                    for (let j = 0; j < parts; j++) {
                        const size = 5 + Math.random() * 10;
                        const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 5, 5), cloudMat);
                        sphere.position.set((Math.random()-0.5)*15, (Math.random()-0.5)*5, (Math.random()-0.5)*15);
                        cloudGroup.add(sphere);
                    }
                    cloudGroup.position.set(
                        (Math.random() - 0.5) * 800,
                        80 + Math.random() * 60,
                        (Math.random() - 0.5) * 800
                    );
                    cloudGroup.rotation.y = Math.random() * Math.PI * 2;
                    scene.add(cloudGroup);
                    cloudMeshes.push(cloudGroup);
                }
            }

            // =========================================================================
            // PLAYER CONTROLS & PHYSICS
            // =========================================================================
            function setupControls() {
                document.addEventListener('keydown', (e) => keys[e.code] = true);
                document.addEventListener('keyup', (e) => keys[e.code] = false);

                renderer.domElement.requestPointerLock = renderer.domElement.requestPointerLock || renderer.domElement.mozRequestPointerLock;
                document.addEventListener('click', () => {
                    renderer.domElement.requestPointerLock();
                });

                document.addEventListener('pointerlockchange', lockChange);
                document.addEventListener('mozpointerlockchange', lockChange);

                function lockChange() {
                    if (document.pointerLockElement === renderer.domElement) {
                        mouseLocked = true;
                        document.addEventListener('mousemove', onMouseMove);
                    } else {
                        mouseLocked = false;
                        document.removeEventListener('mousemove', onMouseMove);
                    }
                }

                function onMouseMove(e) {
                    if (!mouseLocked) return;
                    player.yaw -= e.movementX * CONFIG.MOUSE_SENSITIVITY;
                    player.pitch -= e.movementY * CONFIG.MOUSE_SENSITIVITY;
                    player.pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, player.pitch));
                }
            }

            function updatePlayer(dt) {
                if (!mouseLocked) return;

                // Movement direction
                const moveDir = new THREE.Vector3(0, 0, 0);
                if (keys['KeyW']) moveDir.z -= 1;
                if (keys['KeyS']) moveDir.z += 1;
                if (keys['KeyA']) moveDir.x -= 1;
                if (keys['KeyD']) moveDir.x += 1;

                if (moveDir.lengthSq() > 0) moveDir.normalize();

                // Apply yaw rotation
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);
                const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);

                const wishDir = new THREE.Vector3(0, 0, 0);
                wishDir.addScaledVector(forward, moveDir.z);
                wishDir.addScaledVector(right, moveDir.x);

                let speed = CONFIG.PLAYER_SPEED;
                if (keys['ShiftLeft']) speed *= CONFIG.SPRINT_MULT;

                // Simple physics (gravity, ground collision)
                player.velocity.x = wishDir.x * speed;
                player.velocity.z = wishDir.z * speed;

                // Jump
                if (keys['Space'] && player.onGround) {
                    player.velocity.y = 7;
                    player.onGround = false;
                }

                // Gravity
                player.velocity.y += CONFIG.GRAVITY * dt;

                // Move and collide with terrain
                const newPos = player.position.clone().addScaledVector(player.velocity, dt);
                const groundY = getTerrainHeight(newPos.x, newPos.z) + CONFIG.PLAYER_HEIGHT;

                if (newPos.y <= groundY) {
                    newPos.y = groundY;
                    player.velocity.y = 0;
                    player.onGround = true;
                } else {
                    player.onGround = false;
                }

                player.position.copy(newPos);

                // Update camera
                camera.position.copy(player.position);
                camera.rotation.set(player.pitch, player.yaw, 0, 'YXZ');

                // Update UI coords
                document.getElementById('coords').innerText = `${Math.round(player.position.x)}, ${Math.round(player.position.y)}, ${Math.round(player.position.z)}`;
            }

            // Helper to get terrain height at arbitrary world coordinate (using chunks)
            function getTerrainHeight(x, z) {
                // Sample from chunk data if exists, else compute with noise
                const cx = Math.floor(x / CONFIG.CHUNK_SIZE);
                const cz = Math.floor(z / CONFIG.CHUNK_SIZE);
                const chunkKey = getChunkKey(cx, cz);
                if (chunks.has(chunkKey)) {
                    // For simplicity, we recompute height using noise; real solution would sample mesh.
                    // But we have getHeight function anyway.
                }
                // Use same noise function (but we need simplex accessible)
                const freq1 = 0.005;
                const freq2 = 0.02;
                const freq3 = 0.1;
                let y = simplex.noise2D(x * freq1, z * freq1) * 20
                        + simplex.noise2D(x * freq2, z * freq2) * 8
                        + simplex.noise2D(x * freq3, z * freq3) * 3
                        + Math.abs(simplex.noise2D(x * 0.001, z * 0.001)) * 30;
                return Math.max(CONFIG.SEA_LEVEL - 2, y);
            }

            // =========================================================================
            // CHUNK STREAMING (infinite world)
            // =========================================================================
            function updateChunks() {
                const cx = Math.floor(player.position.x / CONFIG.CHUNK_SIZE);
                const cz = Math.floor(player.position.z / CONFIG.CHUNK_SIZE);

                if (currentChunkCoords.cx === cx && currentChunkCoords.cz === cz) return;

                currentChunkCoords = { cx, cz };

                // Determine which chunks should exist
                const rd = CONFIG.RENDER_DISTANCE;
                const neededKeys = new Set();
                for (let dx = -rd; dx <= rd; dx++) {
                    for (let dz = -rd; dz <= rd; dz++) {
                        const key = getChunkKey(cx + dx, cz + dz);
                        neededKeys.add(key);
                        if (!chunks.has(key)) {
                            // generate new chunk
                            const chunk = new TerrainChunk(cx + dx, cz + dz);
                            scene.add(chunk.mesh);
                            chunks.set(key, chunk);
                        }
                    }
                }

                // Remove far chunks
                for (let [key, chunk] of chunks) {
                    if (!neededKeys.has(key)) {
                        chunk.dispose();
                        chunks.delete(key);
                    }
                }

                // Update tree instances after chunk changes
                updateTreeInstancesFromChunks();
            }

            // =========================================================================
            // ANIMATION LOOP & DAY CYCLE
            // =========================================================================
            function animate() {
                requestAnimationFrame(animate);

                const dt = Math.min(clock.getDelta(), 0.1); // safety

                if (stats) stats.begin();

                // Update player
                updatePlayer(dt);

                // Update chunks based on player position
                updateChunks();

                // Day/night cycle (rotate sun)
                const time = performance.now() * 0.001 * CONFIG.DAY_CYCLE_SPEED;
                sunLight.position.x = 200 * Math.sin(time);
                sunLight.position.z = 200 * Math.cos(time);
                sunLight.position.y = 150 + 50 * Math.sin(time * 0.5);
                // Adjust ambient/colors
                const sunHeight = Math.sin(time);
                if (sunHeight > 0.2) {
                    // day
                    ambientLight.intensity = 0.4 + sunHeight * 0.2;
                    sunLight.intensity = 1.2;
                } else {
                    // night
                    ambientLight.intensity = 0.1;
                    sunLight.intensity = 0.3;
                }

                // Animate clouds (slow drift)
                cloudMeshes.forEach(cloud => {
                    cloud.position.x += 0.005;
                    cloud.position.z += 0.003;
                    if (cloud.position.x > 500) cloud.position.x = -500;
                    if (cloud.position.z > 500) cloud.position.z = -500;
                });

                // Water wave effect (simple offset)
                if (waterMesh) {
                    waterMesh.material.emissiveIntensity = 0.3 + Math.sin(performance.now() * 0.005) * 0.1;
                }

                renderer.render(scene, camera);

                if (stats) stats.end();
            }

            // =========================================================================
            // INITIALIZATION
            // =========================================================================
            function init() {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x111122);
                scene.fog = new THREE.FogExp2(0x111122, 0.002);

                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.copy(player.position);

                renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.body.appendChild(renderer.domElement);

                if (CONFIG.SHOW_STATS) {
                    stats = new Stats();
                    stats.showPanel(0);
                    document.body.appendChild(stats.dom);
                }

                // Setup lights and sky
                createSky();

                // Water
                createWater();

                // Tree instancing
                initTreeInstancing();

                // Controls
                setupControls();

                // Initial chunks around 0,0
                for (let dx = -CONFIG.RENDER_DISTANCE; dx <= CONFIG.RENDER_DISTANCE; dx++) {
                    for (let dz = -CONFIG.RENDER_DISTANCE; dz <= CONFIG.RENDER_DISTANCE; dz++) {
                        const chunk = new TerrainChunk(dx, dz);
                        scene.add(chunk.mesh);
                        chunks.set(getChunkKey(dx, dz), chunk);
                    }
                }
                updateTreeInstancesFromChunks();

                // Start loop
                animate();

                // Resize handler
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            // Start everything
            window.addEventListener('load', init);
        })();
    </script>
</body>
</html>
