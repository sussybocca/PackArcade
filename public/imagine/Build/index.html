<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
    <div style="position: absolute; top: 10px; right: 10px; background: white; padding: 10px;">
        <textarea id="userCode" rows="5" cols="40">// Try: gameSpeed = 20; or score += 100;</textarea>
        <button onclick="runCode()">Run Code</button>
    </div>
    <canvas id="unity-canvas"></canvas>
    
    <script>
        function runCode() {
            var code = document.getElementById('userCode').value;
            if (unityInstance) {
                unityInstance.SendMessage('BrowserCodeBridge', 'RunUserScript', code);
            }
        }
    </script>
</body>
</html>
