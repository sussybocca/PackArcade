<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PackArcade Languages</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { text-align: center; background: rgba(0,0,0,0.3); padding: 3rem; border-radius: 20px; backdrop-filter: blur(5px); }
        h1 { font-size: 3rem; margin-bottom: 2rem; }
        ul { list-style: none; padding: 0; }
        li { margin: 1rem 0; }
        a { color: #ffdd57; font-size: 2rem; text-decoration: none; border-bottom: 2px solid transparent; transition: 0.3s; }
        a:hover { border-bottom-color: #ffdd57; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Choose your language</h1>
        <ul>
            <li><a href="https://fr.packarcade.xyz">Français</a></li>
            <li><a href="https://es.packarcade.xyz">Español</a></li>
            <li><a href="https://en.packarcade.xyz">English</a></li>
            <li><a href="https://de.packarcade.xyz">Deutsch</a></li>
        </ul>
        <p><small>Or visit <a href="/" style="color:#fff;">the main site</a>.</small></p>
    </div>
</body>
</html>
